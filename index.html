document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"th\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover\">\n<title>TM Japan Pre-Order<\u002Ftitle>\n<meta name=\"theme-color\" content=\"#0c0f20\">\n<meta name=\"mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n<meta name=\"apple-mobile-web-app-title\" content=\"JP Order\">\n<link rel=\"apple-touch-icon\" href=\"7b68d836-ef0a-4546-b7bb-02ac798852bc\">\n<link rel=\"icon\" type=\"image/png\" sizes=\"64x64\" href=\"2f1d0578-f16b-4f5a-8c0f-1cdbf236db75\">\n\n<script>/* โหลดฟอนต์/ไอคอนจาก CDN ตอนใช้งาน ไม่ฝังในไฟล์ */\n[\"https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css\",\n \"https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap\"].forEach(function(u){var l=document.createElement(\"link\");l.rel=\"stylesheet\";l.href=u;document.head.appendChild(l);});<\u002Fscript>\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\n:root{\n  --sidebar-w:230px;\n  --accent:#5b8cff;--accent2:#8b5cf6;--accent-light:#232c4f;--accent-text:#a5b4fc;\n  --bg:#0c0f20;--surface:#161b30;--surface2:#1e2540;--border:#2a3257;--img-bg:#11152b;\n  --text:#f3f5fc;--text2:#aab2d5;--text3:#6c759e;--text4:#7F5FF4;\n  --green:#34d399;--green-bg:#11261f;--red:#f87171;--red-bg:#2a1418;\n  --amber:#fbbf24;--amber-bg:#2a2010;--warn-line:#5a4a16;\n  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;\n  --shadow:0 1px 3px rgba(0,0,0,.28),0 6px 20px rgba(0,0,0,.30);--shadow-md:0 4px 14px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.55);\n  --topnav-h:56px;\n}\n[data-theme=\"light\"]{\n  --accent:#6366f1;--accent2:#8b5cf6;\n  --accent-light:#eef0fe;--accent-text:#4f46e5;\n  --bg:#f6f8fc;--surface:#ffffff;--surface2:#f1f4fa;--border:#e4e9f3;--img-bg:#f1f4fa;\n  --text:#11151f;--text2:#5b6478;--text3:#9aa2b4;--text4:#7F5FF4;\n  --green:#059669;--green-bg:#e7f7ef;--red:#dc2626;--red-bg:#fdeaea;\n  --amber:#d97706;--amber-bg:#fdf4e3;--warn-line:#f5d8a8;\n  --shadow:0 1px 2px rgba(17,21,31,.05),0 6px 18px rgba(31,41,90,.10);--shadow-md:0 4px 10px rgba(17,21,31,.06),0 18px 44px rgba(31,41,90,.16);\n}\nhtml,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}\nbody{font-family:'Noto Sans Thai',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;display:flex;flex-direction:column}\n/* smooth theme switch */\n.theme-anim,.theme-anim *,.theme-anim *::before,.theme-anim *::after{transition:background-color .14s ease,background .14s ease,color .14s ease,border-color .14s ease,box-shadow .14s ease!important}\n\n/* ── TOP NAV ── colorful gradient */\n.topnav{height:var(--topnav-h);background:linear-gradient(135deg,#3730a3 0%,#4f46e5 50%,#7c3aed 100%);display:flex;align-items:center;padding:0 calc(1rem + env(safe-area-inset-right,0px)) 0 calc(1rem + env(safe-area-inset-left,0px));gap:10px;flex-shrink:0;z-index:20;box-shadow:0 2px 12px rgba(79,70,229,.35)}\n.hamburger{display:none;background:rgba(255,255,255,.15);border:none;cursor:pointer;padding:6px 8px;border-radius:var(--r8);color:#fff;font-size:20px;align-items:center;justify-content:center}\n.hamburger:hover{background:rgba(255,255,255,.25)}\n.logo{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;white-space:nowrap;color:#fff}\n.logo i{font-size:20px;color:#a5b4fc}\n.search-wrap{position:relative;flex:1;max-width:280px}\n.search-wrap input{width:100%;height:36px;padding:0 30px 0 34px;border:none;border-radius:var(--r20);background:rgba(255,255,255,.18);font-size:13px;color:#fff;outline:none;transition:.2s;font-family:inherit}\n.search-wrap input::placeholder{color:var(--text3)}\n.topnav .search-wrap input::placeholder{color:rgba(255,255,255,.6)}\n.search-wrap input:focus{background:rgba(255,255,255,.28); ms:center;gap:10px;pointer-events:none;z-index:999;padding:0 12px}\n.toast{pointer-events:auto;min-width:240px;max-width:420px;width:max-content;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:12px 14px;display:flex;align-items:center;gap:11px;box-shadow:var(--shadow-md);position:relative;overflow:hidden;animation:t-in .25s cubic-bezier(.2,.8,.2,1)}\n.toast.out{animation:t-out .2s ease forwards}\n@keyframes t-in{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}\n@keyframes t-out{to{transform:translateY(20px);opacity:0}}\n.toast>i{font-size:19px;flex-shrink:0;color:var(--accent-text)}\n.toast .t-msg{font-size:13px;font-weight:600;flex:1;color:var(--text)}\n.toast .t-act{background:none;border:none;color:var(--accent-text);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;padding:6px 8px;border-radius:8px;flex-shrink:0}\n.toast .t-act:active{background:var(--accent-light)}\n.toast .t-bar{position:absolute;left:0;bottom:0;height:3px;background:var(--accent);width:100%;transform-origin:left}\n.toast.ok>i{color:var(--green)}.toast.ok .t-bar{background:var(--green)}\n.toast.err>i{color:var(--red)}.toast.err .t-bar{background:var(--red)}\n.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;max-width:340px;width:90%;box-shadow:var(--shadow-md)}\n.confirm-msg{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:18px;white-space:pre-line}\n.confirm-actions{display:flex;gap:10px;justify-content:flex-end}\n/* tap feedback */\n.btn,.set-grad-btn,.pbuy,.pay-btn,.ch-opt,.size-opt,.theme-opt,.pdone-undo{transition:transform .09s ease,opacity .15s,background .15s,border-color .15s,box-shadow .18s,color .15s}\n.btn:active,.set-grad-btn:active,.pbuy:active,.pay-btn:active,.ch-opt:active,.size-opt:active,.theme-opt:active,.pdone-undo:active{transform:scale(.96)}\n.set-grad-btn,.pbuy,.btn.primary{position:relative;overflow:hidden}\n.rpl{position d-color:#fbbf24;--card-bg:#2a2010\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-cash\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-deposit\">฿0<\u002Fdiv>\n          <div class=\"stat-label\">ยอดมัดจำทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card orders-only-card\" style=\"--card-color:#f87171;--card-bg:#2a1418\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-clock-dollar\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-balance\">฿0<\u002Fdiv>\n          <div class=\"stat-label\">ยอดเงินลูกค้าค้างชำระ<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card orders-only-card\" style=\"--card-color:#34d399;--card-bg:#11261f\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-circle-check\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-paid\">0<\u002Fdiv>\n          <div class=\"stat-label\">จ่ายครบแล้ว<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\" style=\"--card-color:#a5b4fc;--card-bg:#222842\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-clipboard-list\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-count\">0<\u002Fdiv>\n          <div class=\"stat-label\">ออเดอร์ทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\" style=\"--card-color:#22d3ee;--card-bg:#0e2a30\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-cash-banknote\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-sales\">฿0<\u002Fdiv>\n          <div class=\"stat-label\">ยอดขายรวม<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\" style=\"--card-color:#fb923c;--card-bg:#2a1c10\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-coin\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-cost\">฿0<\u002Fdiv>\n          <div class=\"stat-label\">ต้นทุนรวมทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stat-card\" style=\"--card-color:#34d399;--card-bg:#11261f\">\n          <div class=\"stat-card-icon\"><i class=\"ti ti-trending-up\"><\u002Fi><\u002Fdiv>\n          <div class=\"stat-val\" id=\"o-profit\">฿0<\u002Fdiv>\n          <div class=\"stat-label\">กำไรรวมทั้งหมด<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- สรุปยอดขายต่อสินค้า -->\n      <div id=\"sales-summary-wrap\" style=\"padding:0 1.25rem 1.25rem\">\n        <div class=\"collapse-head\" onclick=\"toggleSection('sales')\">\n          <i class=\"ti ti-chart-bar\"><\u002Fi>สรุปยอดขายต่อสินค้า\n          <i class=\"ti ti-chevron-down collapse-arrow\" id=\"arrow-sales\"><\u002Fi>\n        <\u002Fdiv>\n        <div id=\"sales-body\" class=\"sec-body\">\n          <div id=\"sales-summary-list\" style=\"display:flex;flex-direction:column;gap:8px\"><\u002Fdiv>\n          <div id=\"sales-grand-total\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding:0 1.25rem\">\n        <div class=\"collapse-head\" onclick=\"toggleSection('list')\">\n          <i class=\"ti ti-list-details\"><\u002Fi>รายการออเดอร์\n          <i class=\"ti ti-chevron-down collapse-arrow\" id=\"arrow-list\"><\u002Fi>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"list-body\" class=\"sec-body\">\n        <div class=\"orders-list\" id=\"orders-list\"><\u002Fdiv>\n        <div id=\"orders-empty\" class=\"empty-state\" style=\"display:none\">\n          <i class=\"ti ti-clipboard-off\"><\u002Fi>ยังไม่มีออเดอร์<br>\n          <span style=\"font-size:12px\">กดปุ่ม Add Order ที่สินค้าเพื่อเพิ่มออเดอร์<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv><!-- /view-orders -->\n  <\u002Fmain>\n<\u002Fdiv>\n\n<div class=\"mobile-bottom-nav\"><div class=\"mob-nav-inner\" id=\"mob-nav\"><\u002Fdiv><\u002Fdiv>\n<button class=\"fab\" onclick=\"openAddModal()\"><i class=\"ti ti-plus\"><\u002Fi><\u002Fbutton>\n<div id=\"modal-root\"><\u002Fdiv>\n<div id=\"lightbox-root\"><\u002Fdiv>\n\n<script>\nconst BUILT_IN_CATS={\n  Shoes:{label:\"Shoes\",icon:\"ti-shoe\",badge:\"#1e2747|#93c5fd\",hasSizes:true},\n  Cosmatic:{label:\"Cosmetics\",icon:\"ti-sparkles\",badge:\"#2e1626|#f9a8d4\",hasSizes:false},\n  AcneStudio:{label:\"Acne Studios\",icon:\"ti-hanger\",badge:\"#241a4a|#c4b5fd\",hasSizes:true},\n  Longchamp:{label:\"Longchamp\",icon:\"ti-briefcase\",badge:\"#0f2e24|#6ee7b7\",hasSizes:false},\n  HMM:{label:\"HMM\",icon:\"ti-heart\",badge:\"#2a2010|#fcd34d\",hasSizes:true},\n  Google:{label:\"Google / Fitbit\",icon:\"ti-device-watch\",badge:\"#0f2e24|#6ee7b7\",hasSizes:false}\n};\nconst CLOTHING_SIZES=[\"XXS\",\"XS\",\"S\",\"M\",\"L\",\"XL\",\"2XL\",\"3XL\"];\nconst CAT_ICONS=[\"ti-shopping-bag\",\"ti-comet\",\"ti-backpack\",\"ti-wallet\",\"ti-shoe\",\"ti-shirt\",\"ti-hanger\",\"ti-sparkles\",\"ti-bottle\",\"ti-brush\",\"ti-device-watch\",\"ti-sunglasses\",\"ti-diamond\",\"ti-headphones\",\"ti-device-mobile\",\"ti-camera\",\"ti-gift\",\"ti-cup\",\"ti-flower\",\"ti-heart\",\"ti-star\",\"ti-package\",\"ti-rocket\",\"ti-circle-dotted-letter-b\",\"ti-mood-crazy-happy\",\"ti-tag\"];\n// each product has sizeType: 'none' | 'clothing' | 'shoes'\nfunction migrateSizeType(p){\n  if(p.sizeType)return p;\n  if(p.cat==='Shoes')p.sizeType='shoes';\n  else if(p.cat==='HMM'||p.cat==='AcneStudio')p.sizeType='clothing';\n  else p.sizeType='none';\n  return p;\n}\n\nfunction getAllCats(){\n  const custom=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]');\n  const r={...BUILT_IN_CATS};custom.forEach(c=>{r[c.key]=c;});return r;\n}\nfunction getCatOrder(){try{return JSON.parse(localStorage.getItem('jp2_cat_order')||'[]')}catch(e){return[]}}\nfunction setCatOrder(arr){localStorage.setItem('jp2_cat_order',JSON.stringify(arr));schedulePush();}\nfunction orderedCatKeys(){\n  const all=Object.keys(getAllCats());\n  const ord=getCatOrder().filter(k=>all.includes(k));\n  all.forEach(k=>{if(!ord.includes(k))ord.push(k);}); // คีย์ที่ยังไม่อยู่ในลำดับ ต่อท้ายให้เอง\n  return ord;\n}\nfunction reorderCat(fromKey,toKey){\n  if(!fromKey||fromKey===toKey)return;\n  const ord=orderedCatKeys();\n  const fi=ord.indexOf(fromKey),ti=ord.indexOf(toKey);\n  if(fi<0||ti<0)return;\n  ord.splice(fi,1);ord.splice(ti,0,fromKey);\n  setCatOrder(ord);haptic();buildSidebarNav();render();\n}\nfunction saveCustomCat(key,label,hasSizes,icon){\n  const custom=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]');\n  if(!custom.find(c=>c.key===key)){\n    custom.push({key,label,icon:icon||'ti-tag',badge:\"#222842|#cbd5e1\",hasSizes:!!hasSizes});\n    localStorage.setItem('jp2_custom_cats',JSON.stringify(custom));\n    schedulePush();\n  }\n}\nfunction deleteCustomCat(key){\n  const custom0=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]');\n  if(!custom0.find(c=>c.key===key))return;\n  const cats=getAllCats();const lbl=cats[key]?cats[key].label:key;\n  const cnt=products.filter(p=>p.cat===key).length;\n  confirmDialog('ต้องการลบหมวดหมู่ \"'+lbl+'\" ?'+(cnt>0?'\\nมีสินค้า '+cnt+' รายการในหมวดนี้':''),()=>{\n    const custom=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]');\n    const idx=custom.findIndex(c=>c.key===key);if(idx<0)return;\n    const removed=custom[idx];\n    custom.splice(idx,1);\n    localStorage.setItem('jp2_custom_cats',JSON.stringify(custom));\n    schedulePush();\n    if(currentCat===key)currentCat='';\n    buildSidebarNav();render();\n    toast('ลบหมวด \"'+lbl+'\" แล้ว',{actionLabel:'เลิกทำ',duration:3000,onAction:()=>{\n      const cur=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]');\n      cur.splice(Math.min(idx,cur.length),0,removed);\n      localStorage.setItem('jp2_custom_cats',JSON.stringify(cur));\n      schedulePush();buildSidebarNav();render();\n    }});\n  },{okLabel:'ลบ',danger:true});\n}\nfunction getCatColorClass(cat){\n  const known=['Shoes','HMM','Cosmatic','AcneStudio','Longchamp','Google'];\n  return 'cat-color-'+(known.includes(cat)?cat:'default');\n}\n\nconst INIT=[]; // ข้อมูลตั้งต้นย้ายไปอยู่ใน Google Sheet ทั้งหมดแล้ว\n\nlet products=(JSON.parse(localStorage.getItem('jp2_products')||'null')||INIT.map(p=>({...p}))).map(migrateSizeType);\nlet orders=(JSON.parse(localStorage.getItem('jp2_orders')||'[]')).map(normOrder);\nlet currentCat='';\nlet currentView='products';\nlet nextId=Math.max(...products.map(p=>p.id))+1;\nlet nextOrderId=orders.length?Math.max(...orders.map(o=>o.id))+1:1;\nconst CHANNELS={\n  Facebook:{label:\"Facebook\",icon:\"ti-brand-facebook\",cls:\"ch-facebook\",color:\"#1877F2\",bg:\"rgba(24,119,242,.12)\"},\n  LINE:{label:\"LINE\",icon:\"ti-brand-line\",cls:\"ch-line\",color:\"#06C755\",bg:\"rgba(6,199,85,.12)\"},\n  Instagram:{label:\"Instagram\",icon:\"ti-brand-instagram\",cls:\"ch-instagram\",color:\"#E1306C\",bg:\"rgba(225,48,108,.12)\"},\n  Personal:{label:\"Personal\",icon:\"ti-user\",cls:\"ch-personal\",color:\"#9aa1b8\",bg:\"rgba(154,161,184,.12)\"}\n};\n\nfunction getRates(){return{rate:parseFloat(localStorage.getItem('jp2_rate')||'0.230'),tax:parseFloat(localStorage.getItem('jp2_tax')||'8')};}\nfunction calcTaxFree(jpy){const{rate,tax}=getRates();return jpy*(1-tax/100)*rate;}\n// ส่วนต่าง: ราคาขายในไทย − ราคาขายลูกค้า (โชว์เฉพาะเมื่อกรอกราคาไทย และถูกกว่าจริง)\nfunction thbDiffStr(p){\n  const thb=Number(p.thb)||0,sell=Number(p.sell)||0,diff=thb-sell;\n  if(thb<=0||diff<=0)return '';\n  return `<span class=\"thb-diff\">(${diff.toLocaleString()})<\u002Fspan>`;\n}\nfunction applyRatesToAll(silent){\n  products.forEach(p=>{if(!p.jpy)return;p.taxfree=parseFloat(calcTaxFree(p.jpy).toFixed(2));p.profit=parseFloat((p.sell-p.taxfree).toFixed(2));});\n  save();render();\n  if(!silent)showToast('✓ บันทึกอัตราและอัปเดตต้นทุนแล้ว');\n}\nfunction setRatePreview(){\n  const el=document.getElementById('set-rate-preview');if(!el)return;\n  const rate=parseFloat(document.getElementById('set-rate').value)||0;\n  const tax=parseFloat(document.getElementById('set-tax').value)||0;\n  el.textContent=`ตัวอย่าง: ¥10,000 → ฿${Math.round(10000*(1-tax/100)*rate).toLocaleString()}`;\n}\nfunction saveRatesFromSettings(){\n  const rate=parseFloat(document.getElementById('set-rate').value)||0;\n  const tax=parseFloat(document.getElementById('set-tax').value)||0;\n  localStorage.setItem('jp2_rate',rate);localStorage.setItem('jp2_tax',tax);\n  applyRatesToAll(false);\n}\n\n/* ── THEME ── */\nfunction getTheme(){return localStorage.getItem('jp2_theme')||'dark';}\nfunction applyTheme(){\n  const t=getTheme();\n  document.documentElement.setAttribute('data-theme',t);\n  const mt=document.querySelector('meta[name=\"theme-color\"]');if(mt)mt.content=(t==='light'?'#f6f8fc':'#0c0f20');\n  const ic=document.querySelector('#theme-quick i');if(ic)ic.className='ti '+(t==='dark'?'ti-sun':'ti-moon-stars');\n}\nfunction setTheme(t){\n  const root=document.documentElement;\n  root.classList.add('theme-anim');\n  clearTimeout(setTheme._tm);setTheme._tm=setTimeout(()=>root.classList.remove('theme-anim'),200);\n  localStorage.setItem('jp2_theme',t);\n  applyTheme();\n  document.querySelectorAll('#set-theme-grid .theme-opt').forEach(el=>el.classList.toggle('sel',el.dataset.th===t));\n}\nfunction quickTheme(){setTheme(getTheme()==='dark'?'light':'dark');haptic();}\n\n/* ── SETTINGS MODAL ── */\n/* ── GOOGLE SHEET SYNC ── */\nlet pushTimer=null,syncPoll=null,lastPushAt=0,pendingPush=false;\nconst DEFAULT_SYNC_URL='https://script.google.com/macros/s/AKfycbw054qIcABR9cMTr3jgs9savDBlITmViDIsR0VO1RsGTZc44ULGEgFuE8nzQ6YiOYktCg/exec'; // <<< แก้ตรงนี้: วาง Web App URL ที่ลงท้าย /exec\nconst DEFAULT_SYNC_TOKEN='TMPreoderJapan2n'; // <<< แก้ตรงนี้: ใส่ Token เดียวกับใน Apps Script (ฝังไว้เพื่อให้เปิดครั้งแรก sync เลย)\nfunction syncCfg(){return{url:localStorage.getItem('jp2_sync_url')||DEFAULT_SYNC_URL,token:localStorage.getItem('jp2_sync_token')||DEFAULT_SYNC_TOKEN};}\nfunction syncEnabled(){const c=syncCfg();return !!(c.url&&c.token);}\nfunction setSyncIndicator(state){\n  const el=document.getElementById('sync-ind');if(!el)return;\n  const map={off:['ti-cloud-off','ยังไม่ได้เชื่อมต่อ Sheet'],idle:['ti-cloud-check','พร้อมซิงค์'],ok:['ti-cloud-check','ซิงค์ล่าสุดสำเร็จ'],syncing:['ti-refresh','กำลังซิงค์...'],err:['ti-cloud-x','ซิงค์มีปัญหา — แตะเพื่อตรวจ']};\n  const e=map[state]||map.off;\n  el.dataset.s=state;el.title=e[1];el.innerHTML='<i class=\"ti '+e[0]+'\"><\u002Fi>';\n}\nfunction setSyncStatus(msg,kind){\n  const el=document.getElementById('sync-status');if(el){el.textContent=msg;el.dataset.kind=kind||'';}\n  setSyncIndicator(kind==='ok'?'ok':kind==='err'?'err':'syncing');\n}\nfunction fmtD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}\nfunction fmtT(d){return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}\nfunction normOrder(o){\n  o.id=+o.id;\n  if(o.productId!=null&&o.productId!=='')o.productId=+o.productId;\n  o.sell=+o.sell||0;\n  if(o.deposit!=null&&o.deposit!=='')o.deposit=+o.deposit||0;\n  o.customer=o.customer==null?'':String(o.customer);\n  o.size=o.size==null?'':String(o.size);\n  o.note=o.note==null?'':String(o.note);\n  o.productName=o.productName==null?'':String(o.productName);\n  o.channel=o.channel==null?'':String(o.channel);\n  o.status=o.status==null?'':String(o.status);\n  // ซ่อมวันที่/เวลาที่ถูก Google Sheets แปลงเป็น Date (ISO / epoch 1899)\n  if(o.date!=null){const s=String(o.date);if(s.indexOf('T')>=0){const d=new Date(s);o.date=isNaN(d)?s:fmtD(d);}else o.date=s;}\n  if(o.time!=null){const s=String(o.time);if(s.indexOf('T')>=0||s.indexOf('1899')>=0){const d=new Date(s);o.time=isNaN(d)?s:fmtT(d);}else o.time=s;}\n  if(typeof o.purchased==='string')o.purchased=/^(true|ใช่)$/i.test(o.purchased.trim());\n  return o;\n}\nfunction reloadState(){\n  products=(JSON.parse(localStorage.getItem('jp2_products')||'null')||INIT.map(p=>({...p}))).map(migrateSizeType);\n  orders=(JSON.parse(localStorage.getItem('jp2_orders')||'[]')).map(normOrder);\n  nextId=Math.max(0,...products.map(p=>+p.id||0))+1;\n  nextOrderId=orders.length?Math.max(...orders.map(o=>+o.id||0))+1:1;\n  buildSidebarNav();render();\n}\nfunction applyPulled(d){\n  localStorage.setItem('jp2_products',JSON.stringify(d.products||[]));\n  localStorage.setItem('jp2_orders',JSON.stringify((d.orders||[]).map(normOrder)));\n  localStorage.setItem('jp2_custom_cats',JSON.stringify(d.categories||[]));\n  if(d.settings&&d.settings[0]){\n    if(d.settings[0].rate!=null)localStorage.setItem('jp2_rate',d.settings[0].rate);\n    if(d.settings[0].tax!=null)localStorage.setItem('jp2_tax',d.settings[0].tax);\n    if(d.settings[0].order!=null){\n      try{const o=typeof d.settings[0].order==='string'?JSON.parse(d.settings[0].order):d.settings[0].order;\n        if(Array.isArray(o))localStorage.setItem('jp2_cat_order',JSON.stringify(o));}catch(e){}\n    }\n  }\n  reloadState();\n}\nasync function pullFromSheet(){\n  const c=syncCfg();if(!c.url||!c.token){setSyncStatus('ใส่ URL และ Token ก่อน','err');return;}\n  try{\n    setSyncStatus('กำลังดึงข้อมูล...','');\n    const res=await fetch(c.url+'?token='+encodeURIComponent(c.token));\n    const d=await res.json();\n    if(d.error){setSyncStatus('Token ไม่ถูกต้อง หรือไม่มีสิทธิ์','err');return;}\n    applyPulled(d);\n    setSyncStatus('ดึงข้อมูลล่าสุดแล้ว '+new Date().toLocaleTimeString('th-TH'),'ok');\n  }catch(e){setSyncStatus('เชื่อมต่อไม่ได้ ตรวจ URL อีกครั้ง','err');}\n}\nasync function pushToSheet(){\n  const c=syncCfg();if(!c.url||!c.token)return;\n  setSyncIndicator('syncing');\n  try{\n    const data={\n      products:products,\n      orders:orders,\n      categories:JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]'),\n      settings:[{rate:getRates().rate,tax:getRates().tax,order:JSON.stringify(getCatOrder())}]\n    };\n    await fetch(c.url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({token:c.token,data})});\n    lastPushAt=Date.now();\n    pendingPush=false;\n    setSyncStatus('บันทึกขึ้น Sheet แล้ว '+new Date().toLocaleTimeString('th-TH'),'ok');\n  }catch(e){setSyncStatus('ส่งข้อมูลไม่ได้','err');}  // คง pendingPush ไว้ กันดึงทับข้อมูลที่ยังไม่ sync\n}\nfunction schedulePush(){\n  if(!syncEnabled())return;\n  pendingPush=true;                       // มีการแก้ข้อมูลในเครื่อง ยังไม่ขึ้น Sheet\n  clearTimeout(pushTimer);\n  pushTimer=setTimeout(pushToSheet,1200);\n}\nfunction startSyncPolling(){\n  clearInterval(syncPoll);\n  if(!syncEnabled())return;\n  syncPoll=setInterval(()=>{\n    if(document.getElementById('modal-root').innerHTML.trim()!=='')return; // ไม่ดึงทับระหว่างเปิด modal\n    if(pendingPush){pushToSheet();return;}                                  // มีของแก้ค้างอยู่ → push ก่อน ห้ามดึงทับ\n    if(Date.now()-lastPushAt<3000)return;                                   // เพิ่งพุชไป ข้ามรอบนี้\n    const c=syncCfg();if(!c.url||!c.token)return;\n    fetch(c.url+'?token='+encodeURIComponent(c.token)).then(r=>r.json()).then(d=>{if(!d.error)applyPulled(d);}).catch(()=>{});\n  },12000);\n}\nasync function saveSyncCfg(){\n  let url=(document.getElementById('set-sync-url').value||'').trim();\n  if(!url)url=DEFAULT_SYNC_URL;\n  const token=(document.getElementById('set-sync-token').value||'').trim();\n  localStorage.setItem('jp2_sync_url',url);\n  localStorage.setItem('jp2_sync_token',token);\n  if(!token){clearInterval(syncPoll);setSyncStatus('ใส่ Token ก่อน','err');return;}\n  try{\n    setSyncStatus('กำลังเชื่อมต่อ...','');\n    const res=await fetch(url+'?token='+encodeURIComponent(token));\n    const d=await res.json();\n    if(d.error){setSyncStatus('Token ไม่ถูกต้อง','err');return;}\n    const sheetEmpty=!(d.products&&d.products.length)&&!(d.orders&&d.orders.length);\n    if(sheetEmpty&&(products.length||orders.length)){\n      await pushToSheet();          // Sheet ว่าง + มีข้อมูลในเครื่อง → อัปขึ้นไปตั้งต้น\n      setSyncStatus('อัปข้อมูลในเครื่องขึ้น Sheet แล้ว','ok');\n    }else{\n      applyPulled(d);               // มีข้อมูลใน Sheet → ใช้ของ Sheet\n      setSyncStatus('เชื่อมต่อ & ซิงค์สำเร็จ','ok');\n    }\n    startSyncPolling();\n  }catch(e){setSyncStatus('เชื่อมต่อไม่ได้ ตรวจ URL','err');}\n}\n\nfunction openSettings(){\n  closeSidebar();\n  const{rate,tax}=getRates();const th=getTheme();const hap=getHaptic();\n  document.getElementById('modal-root').innerHTML=`\n  <div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3 style=\"display:flex;align-items:center;gap:10px\"><span class=\"set-hd-ic\"><i class=\"ti ti-settings\"><\u002Fi><\u002Fspan>ตั้งค่า<\u002Fh3>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"width:32px;height:32px;padding:0;justify-content:center;border-radius:50%\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"set-card\">\n      <div class=\"set-head\"><div class=\"set-cic c2\"><i class=\"ti ti-coin\"><\u002Fi><\u002Fdiv><div class=\"set-ctt\">อัตราแลกเปลี่ยน &amp; TaxFree<small>คำนวณต้นทุนจากเงินเยน<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n        <div><label class=\"set-label\">¥1 = (บาท)<\u002Flabel><div class=\"input-icon\"><i class=\"ti ti-coin\"><\u002Fi><input class=\"form-input\" id=\"set-rate\" type=\"number\" step=\"0.001\" min=\"0.001\" value=\"${rate}\" oninput=\"setRatePreview()\"><\u002Fdiv><\u002Fdiv>\n        <div><label class=\"set-label\">Tax Free (%)<\u002Flabel><div class=\"input-icon\"><i class=\"ti ti-receipt-tax\"><\u002Fi><input class=\"form-input\" id=\"set-tax\" type=\"number\" step=\"0.1\" min=\"0\" max=\"30\" value=\"${tax}\" oninput=\"setRatePreview()\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"calc-hint\" id=\"set-rate-preview\" style=\"margin-top:8px\"><\u002Fdiv>\n      <button class=\"set-grad-btn\" style=\"margin-top:10px\" onclick=\"saveRatesFromSettings()\"><i class=\"ti ti-device-floppy\"><\u002Fi>บันทึก &amp; คำนวณใหม่<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"set-card\">\n      <div class=\"set-head\"><div class=\"set-cic c3\"><i class=\"ti ti-device-mobile-code\"><\u002Fi><\u002Fdiv><div class=\"set-ctt\">การสั่น (Haptic)<small>แรงสั่นตอนกดปุ่ม<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n      <div class=\"hap-grid\" id=\"set-hap\">\n        <div class=\"theme-opt${hap===0?' sel':''}\" data-ms=\"0\" onclick=\"setHaptic(0)\"><i class=\"ti ti-device-mobile-x\"><\u002Fi>ปิด<\u002Fdiv>\n        <div class=\"theme-opt${hap===8?' sel':''}\" data-ms=\"8\" onclick=\"setHaptic(8)\"><i class=\"ti ti-device-mobile-star\"><\u002Fi>เบา<\u002Fdiv>\n        <div class=\"theme-opt${hap===18?' sel':''}\" data-ms=\"18\" onclick=\"setHaptic(18)\"><i class=\"ti ti-device-mobile-vibration\"><\u002Fi>แรง<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"set-card exp-card\">\n      <div class=\"exp-art\"><i class=\"ti ti-file-spreadsheet\"><\u002Fi><span class=\"exp-badge\">.CSV<\u002Fspan><\u002Fdiv>\n      <div class=\"exp-body\">\n        <div class=\"exp-tt\">Export ข้อมูลออเดอร์<\u002Fdiv>\n        <div class=\"exp-sub\">เปิดใน Excel / Google Sheets ได้ · ตอนนี้มี ${orders.length.toLocaleString()} ออเดอร์<\u002Fdiv>\n        <button class=\"exp-btn\" onclick=\"exportOrdersCSV()\"><i class=\"ti ti-download\"><\u002Fi>ดาวน์โหลดไฟล์ .csv<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-footer\" style=\"justify-content:center\">\n      <button class=\"set-grad-btn\" onclick=\"closeModal()\"><i class=\"ti ti-check\"><\u002Fi>เสร็จสิ้น<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n  setRatePreview();\n}\n\nfunction openSync(){\n  closeSidebar();\n  const sc=syncCfg();\n  document.getElementById('modal-root').innerHTML=`\n  <div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3 style=\"display:flex;align-items:center;gap:10px\"><span class=\"set-hd-ic\"><i class=\"ti ti-cloud\"><\u002Fi><\u002Fspan>ซิงค์ข้อมูล<\u002Fh3>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"width:32px;height:32px;padding:0;justify-content:center;border-radius:50%\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"set-section\" style=\"margin-top:2px\">เชื่อมต่อ Google Sheet<\u002Fdiv>\n    <label class=\"set-label\">Web App URL<\u002Flabel>\n    <div class=\"input-icon\" style=\"margin-bottom:10px\"><i class=\"ti ti-link\"><\u002Fi><input class=\"form-input\" id=\"set-sync-url\" placeholder=\"https://script.google.com/.../exec\" value=\"${(sc.url||'').replace(/\"/g,'&quot;')}\"><\u002Fdiv>\n    <label class=\"set-label\">Token<\u002Flabel>\n    <div class=\"input-icon\"><i class=\"ti ti-key\"><\u002Fi><input class=\"form-input\" id=\"set-sync-token\" placeholder=\"รหัสลับที่ตั้งไว้ใน Apps Script\" value=\"${(sc.token||'').replace(/\"/g,'&quot;')}\"><\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px\">\n      <button class=\"set-grad-btn ghost\" onclick=\"pullFromSheet()\"><i class=\"ti ti-cloud-download\"><\u002Fi>ดึงล่าสุด<\u002Fbutton>\n      <button class=\"set-grad-btn\" onclick=\"saveSyncCfg()\"><i class=\"ti ti-refresh\"><\u002Fi>เชื่อมต่อ<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"sync-status\" id=\"sync-status\" data-kind=\"${syncEnabled()?'ok':''}\">${syncEnabled()?'เชื่อมต่ออยู่':'ยังไม่ได้เชื่อมต่อ'}<\u002Fdiv>\n    <div class=\"modal-footer\" style=\"justify-content:center\">\n      <button class=\"set-grad-btn\" onclick=\"closeModal()\"><i class=\"ti ti-check\"><\u002Fi>เสร็จสิ้น<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction exportOrdersCSV(){\n  if(!orders.length){toast('ยังไม่มีออเดอร์ให้ Export',{kind:'err'});return;}\n  confirmDialog(`Export ออเดอร์ ${orders.length} รายการเป็นไฟล์ .csv?`,doExportCSV,{okLabel:'Export'});\n}\nfunction doExportCSV(){\n  const cats=getAllCats();\n  const chLabel=k=>(CHANNELS[k]?CHANNELS[k].label:k);\n  const rows=[['วันที่','เวลา','ลูกค้า','สินค้า','หมวด','ช่องทาง','ไซส์','หมายเหตุ','สถานะ','ราคาขาย','มัดจำ','คงเหลือ','ซื้อของแล้ว']];\n  orders.forEach(o=>{\n    const bal=o.status==='paid'?0:Math.max(0,o.sell-(o.deposit||0));\n    rows.push([o.date||'',o.time||'',o.customer||'',o.productName||'',(cats[o.cat]?cats[o.cat].label:o.cat)||'',chLabel(o.channel),o.size||'',o.note||'',o.status==='paid'?'จ่ายเต็ม':'มัดจำ',o.sell,o.status==='paid'?o.sell:(o.deposit||0),bal,o.purchased?'ใช่':'ไม่']);\n  });\n  const csv='\\uFEFF'+rows.map(r=>r.map(c=>'\"'+String(c).replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n');\n  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='japan_preorder_orders.csv';a.click();\n  showToast('✓ ส่งออกออเดอร์ '+orders.length+' รายการแล้ว');\n}\n\nfunction save(){localStorage.setItem('jp2_products',JSON.stringify(products));localStorage.setItem('jp2_orders',JSON.stringify(orders));schedulePush();}\n\nfunction toggleSidebar(){\n  const sb=document.getElementById('sidebar'),ov=document.getElementById('sidebar-overlay');\n  sb.classList.contains('open')?closeSidebar():(sb.classList.add('open'),ov.classList.add('visible'));\n}\nfunction closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('visible');}\nfunction toggleManage(){\n  const sb=document.getElementById('sidebar');\n  const on=sb.classList.toggle('managing');\n  const btn=document.getElementById('manage-cat-btn');\n  btn.classList.toggle('on',on);\n  btn.innerHTML=on?'<i class=\"ti ti-check\"><\u002Fi>':'<i class=\"ti ti-pencil\"><\u002Fi>';\n  btn.title=on?'เสร็จ':'จัดการหมวดหมู่';\n}\n\nfunction buildSidebarNav(){\n  const cats=getAllCats();const keys=orderedCatKeys();\n  const customKeys=JSON.parse(localStorage.getItem('jp2_custom_cats')||'[]').map(c=>c.key);\n  const onProd=currentView==='products';\n  document.getElementById('sidebar-cats').innerHTML=keys.map(k=>{\n    const isCustom=customKeys.includes(k);\n    const del=isCustom\n      ?`<span class=\"del-cat-btn\" onclick=\"event.stopPropagation();deleteCustomCat('${k}')\" title=\"ลบหมวด\"><i class=\"ti ti-x\"><\u002Fi><\u002Fspan>`:'';\n    return`<div class=\"nav-item${onProd&&currentCat===k?' active':''}\" id=\"nav-${k}\" data-key=\"${k}\" onclick=\"setCat('${k}')\">\n      <span class=\"cat-grip\"><i class=\"ti ti-grip-vertical\"><\u002Fi><\u002Fspan>\n      <i class=\"ti ${cats[k].icon||'ti-tag'} cat-icon\"><\u002Fi>${cats[k].label}\n      <span class=\"cnt\" id=\"cnt-${k}\">${products.filter(p=>p.cat===k).length}<\u002Fspan>${del}\n    <\u002Fdiv>`;\n  }).join('');\n  document.getElementById('nav-all').classList.toggle('active',onProd&&currentCat==='');\n  const mb=document.getElementById('manage-cat-btn');\n  if(mb)mb.style.display='';\n  document.getElementById('cnt-all').textContent=products.length;\n  document.getElementById('cnt-orders').textContent=orders.filter(o=>!o.purchased).length;\n  document.getElementById('cnt-purchased').textContent=orders.filter(o=>o.purchased).length;\n  document.getElementById('mob-nav').innerHTML=\n    `<button class=\"mob-nav-btn${currentView==='orders'?' active':''}\" onclick=\"setView('orders')\"><i class=\"ti ti-clipboard-list\"><\u002Fi>Orders<\u002Fbutton>`+\n    `<button class=\"mob-nav-btn${currentView==='purchased'?' active':''}\" onclick=\"setView('purchased')\"><i class=\"ti ti-circle-check\"><\u002Fi>Purchased<\u002Fbutton>`+\n    `<button class=\"mob-nav-btn${currentView==='products'&&currentCat===''?' active':''}\" onclick=\"setView('products');setCat('')\"><i class=\"ti ti-layout-grid\"><\u002Fi>ทั้งหมด<\u002Fbutton>`+\n    keys.map(k=>`<button class=\"mob-nav-btn${currentView==='products'&&currentCat===k?' active':''}\" onclick=\"setView('products');setCat('${k}')\"><i class=\"ti ${cats[k].icon||'ti-tag'}\"><\u002Fi>${cats[k].label}<\u002Fbutton>`).join('');\n  wireCatDrag();\n}\nfunction wireCatDrag(){\n  const host=document.getElementById('sidebar-cats');if(!host)return;\n  const managing=document.getElementById('sidebar').classList.contains('managing');\n  const items=[...host.querySelectorAll('.nav-item')];\n  items.forEach(it=>{\n    it.draggable=managing;\n    if(!managing)return;\n    it.ondragstart=e=>{it.classList.add('dragging');e.dataTransfer.setData('k',it.dataset.key);e.dataTransfer.effectAllowed='move';};\n    it.ondragend=()=>{it.classList.remove('dragging');items.forEach(x=>x.classList.remove('drop-over'));};\n    it.ondragover=e=>{e.preventDefault();it.classList.add('drop-over');};\n    it.ondragleave=()=>it.classList.remove('drop-over');\n    it.ondrop=e=>{e.preventDefault();reorderCat(e.dataTransfer.getData('k'),it.dataset.key);};\n    const grip=it.querySelector('.cat-grip');\n    if(grip)grip.addEventListener('touchstart',ev=>startCatTouch(ev,it,host),{passive:false});\n  });\n}\nfunction startCatTouch(e,it,host){\n  e.preventDefault();\n  const fromKey=it.dataset.key;it.classList.add('dragging');haptic();\n  const rowsNow=()=>[...host.querySelectorAll('.nav-item')];\n  const move=ev=>{\n    ev.preventDefault();\n    const y=ev.touches[0].clientY;\n    rowsNow().forEach(r=>r.classList.remove('drop-over'));\n    const tgt=rowsNow().find(r=>{const b=r.getBoundingClientRect();return y>=b.top&&y<=b.bottom;});\n    if(tgt)tgt.classList.add('drop-over');\n  };\n  const up=ev=>{\n    document.removeEventListener('touchmove',move);document.removeEventListener('touchend',up);\n    const y=(ev.changedTouches[0]||{}).clientY;\n    const tgt=rowsNow().find(r=>{const b=r.getBoundingClientRect();return y>=b.top&&y<=b.bottom;});\n    it.classList.remove('dragging');rowsNow().forEach(r=>r.classList.remove('drop-over'));\n    if(tgt&&tgt.dataset.key!==fromKey)reorderCat(fromKey,tgt.dataset.key);\n  };\n  document.addEventListener('touchmove',move,{passive:false});\n  document.addEventListener('touchend',up);\n}\n\nfunction setSectionCollapsed(key,collapsed,animate){\n  const body=document.getElementById(key+'-body');\n  if(!body)return;\n  const head=document.querySelector(`#arrow-${key}`).parentElement;\n  head.classList.toggle('collapsed',collapsed);\n  if(!animate){\n    body.style.transition='none';\n    body.style.maxHeight=collapsed?'0px':'none';\n    void body.offsetHeight; // flush\n    body.style.transition='';\n    return;\n  }\n  if(collapsed){\n    body.style.maxHeight=body.scrollHeight+'px';\n    void body.offsetHeight; // lock concrete start before collapsing\n    body.style.maxHeight='0px';\n  }else{\n    body.style.maxHeight=body.scrollHeight+'px';\n    const done=e=>{\n      if(e.target!==body||e.propertyName!=='max-height')return;\n      body.style.maxHeight='none'; // release clamp so later re-renders aren't clipped\n      body.removeEventListener('transitionend',done);\n    };\n    body.addEventListener('transitionend',done);\n  }\n}\nfunction toggleSection(key){\n  const head=document.querySelector(`#arrow-${key}`).parentElement;\n  const willCollapse=!head.classList.contains('collapsed');\n  setSectionCollapsed(key,willCollapse,true);\n  const st=JSON.parse(localStorage.getItem('jp2_collapse')||'{}');\n  st[key]=willCollapse;localStorage.setItem('jp2_collapse',JSON.stringify(st));\n}\nfunction applyCollapseState(){\n  const st=JSON.parse(localStorage.getItem('jp2_collapse')||'{}');\n  ['sales','list'].forEach(key=>{\n    if(document.getElementById(key+'-body'))setSectionCollapsed(key,!!st[key],false);\n  });\n}\nfunction setView(view){\n  currentView=view;\n  closeSidebar();\n  const isOrderLike=(view==='orders'||view==='purchased');\n  const sb=document.getElementById('search-box');\n  if(sb)sb.placeholder=isOrderLike?'ค้นหาลูกค้า / สินค้า...':'ค้นหาสินค้า...';\n  document.getElementById('view-products').style.display=view==='products'?'flex':'none';\n  document.getElementById('view-orders').style.display=isOrderLike?'block':'none';\n  document.getElementById('nav-orders').classList.toggle('active',view==='orders');\n  document.getElementById('nav-purchased').classList.toggle('active',view==='purchased');\n  document.getElementById('nav-all').classList.toggle('active',view==='products'&&currentCat==='');\n  // dynamic header\n  if(isOrderLike){\n    const isPur=view==='purchased';\n    document.getElementById('orders-title').textContent=isPur?'Purchased':'Orders';\n    document.getElementById('orders-sub').textContent=isPur?'รายการที่ซื้อของแล้ว':'รายการที่ลูกค้าสั่ง';\n    // hide deposit/balance/paid cards + sales summary on Purchased\n    document.querySelectorAll('.orders-only-card').forEach(el=>el.style.display=isPur?'none':'');\n    document.getElementById('sales-summary-wrap').style.display=isPur?'none':'';\n    document.getElementById('orders-stats').classList.toggle('stats-row-7',!isPur);\n    document.getElementById('orders-stats').classList.toggle('stats-row-4',isPur);\n    const sh=localStorage.getItem('jp2_ostats_hidden')==='1';\n    const osEl=document.getElementById('orders-stats');\n    osEl.classList.toggle('hidden',sh);osEl.style.maxHeight=sh?'0px':'';\n    const stIc=document.querySelector('#stats-toggle i');if(stIc)stIc.className='ti '+(sh?'ti-play-card-q':'ti-id-badge-off');\n    const stBtn=document.getElementById('stats-toggle');if(stBtn)stBtn.title=sh?'แสดงสรุป':'ซ่อนสรุป';\n    renderOrders();\n    applyCollapseState();\n  }\n  const vp=document.getElementById('view-products'),vo=document.getElementById('view-orders');\n  [vp,vo].forEach(v=>v.classList.remove('view-anim'));\n  const activeV=view==='products'?vp:vo;\n  void activeV.offsetWidth;\n  activeV.classList.add('view-anim');\n  buildSidebarNav();\n}\n\nfunction getFiltered(){\n  const q=document.getElementById('search-box').value.toLowerCase();\n  const sort=document.getElementById('sort-sel').value;\n  let list=products.filter(p=>{\n    if(currentCat&&p.cat!==currentCat)return false;\n    if(q&&!p.name.toLowerCase().includes(q))return false;\n    return true;\n  });\n  if(sort==='profit-desc')list.sort((a,b)=>b.profit-a.profit);\n  else if(sort==='profit-asc')list.sort((a,b)=>a.profit-b.profit);\n  else if(sort==='thb-desc')list.sort((a,b)=>b.thb-a.thb);\n  return list;\n}\nfunction setCat(cat){\n  currentCat=cat;\n  if(currentView!=='products'){\n    currentView='products';\n    document.getElementById('view-products').style.display='flex';\n    document.getElementById('view-orders').style.display='none';\n    document.getElementById('nav-orders').classList.remove('active');\n  }\n  closeSidebar();buildSidebarNav();\n  const cats=getAllCats();\n  document.getElementById('page-title').textContent=cat?(cats[cat]?cats[cat].label:cat):'ทั้งหมด';\n  render();\n}\n\nfunction render(){\n  const list=getFiltered();\n  renderTable(list);renderMobileCards(list);\n  renderStats();renderSidebar();\n  const ps=document.getElementById('products-stats');\n  if(ps)ps.classList.toggle('cat-hide',!!currentCat);\n  document.getElementById('page-sub').textContent=`แสดง ${list.length} จาก ${products.length} รายการ`;\n}\nfunction onSearchInput(){\n  if(currentView==='products')render();\n  else renderOrders();\n}\nfunction toggleOrdersStats(){\n  const os=document.getElementById('orders-stats');\n  const willHide=!os.classList.contains('hidden');\n  if(willHide){\n    os.style.maxHeight=os.scrollHeight+'px';\n    requestAnimationFrame(()=>{os.classList.add('hidden');os.style.maxHeight='0px';});\n  }else{\n    os.classList.remove('hidden');\n    os.style.maxHeight=os.scrollHeight+'px';\n    os.addEventListener('transitionend',function te(e){if(e.propertyName==='max-height'){os.style.maxHeight='';os.removeEventListener('transitionend',te);}});\n  }\n  localStorage.setItem('jp2_ostats_hidden',willHide?'1':'0');\n  const ic=document.querySelector('#stats-toggle i');if(ic)ic.className='ti '+(willHide?'ti-play-card-q':'ti-id-badge-off');\n  const btn=document.getElementById('stats-toggle');if(btn)btn.title=willHide?'แสดงสรุป':'ซ่อนสรุป';\n  haptic();\n}\n\nfunction orderCountFor(productId){return orders.filter(o=>o.productId===productId).length;}\n\nfunction renderTable(list){\n  const tbody=document.getElementById('table-body');\n  const empty=document.getElementById('empty-state');\n  const cats=getAllCats();\n  if(!list||!list.length){tbody.innerHTML='';empty.style.display='block';return;}\n  empty.style.display='none';\n  tbody.innerHTML=list.map(p=>{\n    const sold=orderCountFor(p.id);\n    const tp=Math.round(p.profit*sold);\n    const meta=cats[p.cat]||{hasSizes:false,label:p.cat};\n    const esc=s=>String(s).replace(/\\\\/g,'\\\\\\\\').replace(/'/g,\"\\\\'\");\n    const imgHtml=p.img\n      ?`<img loading=\"lazy\" decoding=\"async\" src=\"${p.img.replace(/\"/g,'&quot;')}\" class=\"prod-img\" onclick=\"viewImg('${esc(p.img)}')\">`\n      :`<div class=\"prod-img-ph\" onclick=\"promptImg(${p.id})\"><i class=\"ti ti-camera\" style=\"font-size:15px\"><\u002Fi><\u002Fdiv>`;\n    const tpHtml=tp>0?`<span class=\"${p.profit>=0?'tp-pos':'tp-neg'}\">฿${tp.toLocaleString()}<\u002Fspan>`:'<span style=\"color:var(--text3)\">—<\u002Fspan>';\n    const soldHtml=sold>0?`<span style=\"font-weight:600;color:var(--accent-text)\">${sold} ชิ้น<\u002Fspan>`:'<span style=\"color:var(--text3)\">—<\u002Fspan>';\n    return`<tr>\n      <td>${imgHtml}<\u002Ftd>\n      <td><div class=\"prod-name\">${p.name}<\u002Fdiv><div class=\"prod-sub\">¥${p.jpy.toLocaleString()} / ฿${p.thb.toLocaleString()}${thbDiffStr(p)}<\u002Fdiv><\u002Ftd>\n      <td><span class=\"badge ${getCatColorClass(p.cat)}\">${meta.label}<\u002Fspan><\u002Ftd>\n      <td class=\"cell-sell\">฿${p.sell.toLocaleString()}<\u002Ftd>\n      <td class=\"cell-cost\">฿${Math.round(p.taxfree).toLocaleString()}<\u002Ftd>\n      <td class=\"${p.profit>=0?'profit-pos':'profit-neg'}\">฿${Math.round(p.profit).toLocaleString()}<\u002Ftd>\n      <td>${soldHtml}<\u002Ftd>\n      <td>${tpHtml}<\u002Ftd>\n      <td><div style=\"display:flex;gap:2px\">\n        <button class=\"icon-btn\" onclick=\"openAddOrder(${p.id})\" title=\"เพิ่มออเดอร์\" style=\"color:var(--accent-text)\"><i class=\"ti ti-shopping-cart-plus\"><\u002Fi><\u002Fbutton>\n        <button class=\"icon-btn\" onclick=\"openEditModal(${p.id})\"><i class=\"ti ti-edit\"><\u002Fi><\u002Fbutton>\n        <button class=\"icon-btn red\" onclick=\"delProduct(${p.id})\"><i class=\"ti ti-trash\"><\u002Fi><\u002Fbutton>\n      <\u002Fdiv><\u002Ftd>\n    <\u002Ftr>`;\n  }).join('');\n}\n\n/* FIX #5: full-width image at top of mobile card */\nfunction renderMobileCards(list){\n  const cats=getAllCats();\n  const el=document.getElementById('mobile-cards');\n  if(!list||!list.length){el.innerHTML=`<div class=\"empty-state\"><i class=\"ti ti-mood-empty\"><\u002Fi>ไม่พบสินค้า<\u002Fdiv>`;return;}\n  el.innerHTML=list.map(p=>{\n    const sold=orderCountFor(p.id);\n    const tp=Math.round(p.profit*sold);\n    const meta=cats[p.cat]||{label:p.cat};\n    const esc=s=>String(s).replace(/\\\\/g,'\\\\\\\\').replace(/'/g,\"\\\\'\");\n    const colorCls=getCatColorClass(p.cat);\n    const coverHtml=p.img\n      ?`<div class=\"m-cover\" onclick=\"viewImg('${esc(p.img)}')\"><div class=\"m-plate\"><img loading=\"lazy\" decoding=\"async\" src=\"${p.img.replace(/\"/g,'&quot;').replace(/'/g,\"%27\")}\" alt=\"\"><\u002Fdiv><\u002Fdiv>`\n      :`<div class=\"m-cover-ph ${colorCls}\" onclick=\"promptImg(${p.id})\">\n          <div class=\"m-cover-ph-icon\"><i class=\"ti ${meta.icon||'ti-camera'}\"><\u002Fi><\u002Fdiv>\n          <span>เพิ่มรูป<\u002Fspan>\n        <\u002Fdiv>`;\n    return`<div class=\"m-card\">\n      ${coverHtml}\n      <div class=\"m-card-body\">\n        <div class=\"m-card-top-row\">\n          <div class=\"m-card-name\">${p.name}<\u002Fdiv>\n          <div class=\"m-actions\">\n            <button class=\"icon-btn\" onclick=\"openEditModal(${p.id})\"><i class=\"ti ti-edit\"><\u002Fi><\u002Fbutton>\n            <button class=\"icon-btn red\" onclick=\"delProduct(${p.id})\"><i class=\"ti ti-trash\"><\u002Fi><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"m-card-meta\">\n          <span class=\"badge ${getCatColorClass(p.cat)}\" style=\"font-size:10px;padding:2px 9px\">${meta.label}<\u002Fspan>\n          <span style=\"font-size:11px;color:var(--text3)\">¥${p.jpy.toLocaleString()} / ฿${p.thb.toLocaleString()}${thbDiffStr(p)}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"m-price-row\">\n          <div>\n            <div class=\"m-mini-label\">ราคาขาย<\u002Fdiv>\n            <div class=\"m-price-sell\">฿${p.sell.toLocaleString()}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"m-mini-label\">ต้นทุน<\u002Fdiv>\n            <div class=\"m-price-cost\">฿${Math.round(p.taxfree).toLocaleString()}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-left:1px solid var(--border);padding-left:12px\">\n            <div class=\"m-mini-label\">กำไร/ชิ้น<\u002Fdiv>\n            <div class=\"m-price-profit\" style=\"color:${p.profit>=0?'var(--green)':'var(--red)'}\">฿${Math.round(p.profit).toLocaleString()}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"m-card-bottom\">\n          <div>\n            <div class=\"m-mini-label\">ขายได้<\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;color:${sold>0?'var(--accent-text)':'var(--text3)'}\">${sold>0?sold+' ชิ้น':'—'}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right\">\n            <div class=\"m-mini-label\">กำไรรวม<\u002Fdiv>\n            <div class=\"m-total\" style=\"color:${tp>0?'var(--green)':'var(--text3)'}\">${tp>0?'฿'+tp.toLocaleString():'—'}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn sm primary nohp\" style=\"width:100%;justify-content:center;margin-top:10px\" onclick=\"openAddOrder(${p.id})\"><i class=\"ti ti-shopping-cart-plus\"><\u002Fi>เพิ่มออเดอร์ลูกค้า<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction orderCountMap(){\n  const m={};orders.forEach(o=>{m[o.productId]=(m[o.productId]||0)+1;});return m;\n}\nfunction renderStats(){\n  const oc=orderCountMap();\n  const cost=products.reduce((s,p)=>s+p.taxfree*(oc[p.id]||0),0);\n  const profit=products.reduce((s,p)=>s+p.profit*(oc[p.id]||0),0);\n  const ordered=products.filter(p=>(oc[p.id]||0)>0).length;\n  document.getElementById('s-total').textContent=products.length;\n  document.getElementById('s-ordered').textContent=ordered;\n  document.getElementById('s-cost').textContent='฿'+Math.round(cost).toLocaleString();\n  document.getElementById('s-profit').textContent='฿'+Math.round(profit).toLocaleString();\n  document.getElementById('s-ordered-sub').textContent=`${products.length} รายการทั้งหมด`;\n  document.getElementById('s-margin').textContent=cost>0?`margin ${((profit/cost)*100).toFixed(1)}%`:'—';\n}\nfunction renderSidebar(){\n  const oc=orderCountMap();\n  const cats=getAllCats();const keys=orderedCatKeys();\n  const profits=keys.map(k=>Math.max(0,products.filter(p=>p.cat===k).reduce((s,p)=>s+p.profit*(oc[p.id]||0),0)));\n  const maxP=Math.max(...profits,1);\n  document.getElementById('cat-bars').innerHTML=keys.map((k,i)=>`\n    <div class=\"cat-bar-item\">\n      <div class=\"cat-bar-label\"><span>${cats[k].label}<\u002Fspan><span>฿${Math.round(profits[i]).toLocaleString()}<\u002Fspan><\u002Fdiv>\n      <div class=\"cat-bar-track\"><div class=\"cat-bar-fill\" style=\"width:${(profits[i]/maxP*100).toFixed(1)}%\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>`).join('');\n}\n\nfunction delProduct(id){\n  const p0=products.find(p=>String(p.id)===String(id));if(!p0)return;\n  const nm=p0.name||'สินค้านี้';\n  confirmDialog('ต้องการลบสินค้า \"'+nm+'\" ?\\nการลบจะมีผลหลังจากบันทึกข้อมูล',()=>{\n    const idx=products.findIndex(p=>String(p.id)===String(id));if(idx<0)return;\n    const removed=products[idx];\n    products.splice(idx,1);save();render();buildSidebarNav();closeModal();\n    toast('ลบสินค้าแล้ว',{actionLabel:'เลิกทำ',duration:3000,onAction:()=>{\n      products.splice(Math.min(idx,products.length),0,removed);save();render();buildSidebarNav();\n    }});\n  },{okLabel:'ลบ',danger:true});\n}\nfunction promptImg(id){\n  const url=prompt('วาง URL รูปภาพ:');\n  if(url&&url.trim()){const p=products.find(x=>String(x.id)===String(id));if(p){p.img=url.trim();save();render();}}\n}\nfunction viewImg(src){\n  const lb=document.getElementById('lightbox-root');\n  lb.innerHTML=`<div class=\"lightbox\" id=\"lb-wrap\"><img src=\"${src}\" onclick=\"event.stopPropagation()\"><button class=\"lb-close\" onclick=\"closeLightbox()\" title=\"ปิด\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton><\u002Fdiv>`;\n  document.getElementById('lb-wrap').addEventListener('click',closeLightbox);\n}\nfunction closeLightbox(){document.getElementById('lightbox-root').innerHTML='';}\nfunction clearSearch(id){const el=document.getElementById(id);if(!el)return;el.value='';el.dispatchEvent(new Event('input'));el.focus();}\nfunction setOrderFilter(kind,val,el){\n  const sel=document.getElementById(kind==='channel'?'order-channel-filter':'order-status-filter');\n  if(sel)sel.value=val;\n  if(el)el.parentElement.querySelectorAll('.ochip').forEach(c=>c.classList.toggle('active',c===el));\n  haptic();renderOrders();\n}\n\nfunction openAddModal(){showProductModal(null);}\nfunction openEditModal(id){showProductModal(products.find(p=>p.id===id));}\nfunction getCatOptions(selected){\n  const cats=getAllCats();\n  return orderedCatKeys().map(k=>`<option value=\"${k}\"${selected===k?' selected':''}>${cats[k].label}<\u002Foption>`).join('')\n    +`<option value=\"__new__\">＋ เพิ่มหมวดหมู่ใหม่...<\u002Foption>`;\n}\n\nfunction showProductModal(p){\n  const isEdit=!!p;\n  const cats=getAllCats();\n  const initCat=p?p.cat:'Shoes';\n  const curSizeType=p?(p.sizeType||'none'):'none';\n  document.getElementById('modal-root').innerHTML=`\n  <div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3>${isEdit?'แก้ไขสินค้า':'เพิ่มสินค้าใหม่'}<\u002Fh3>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"width:32px;height:32px;padding:0;justify-content:center;border-radius:50%\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>ชื่อสินค้า<\u002Flabel>\n      <input class=\"form-input\" id=\"f-name\" value=\"${p?p.name:''}\" placeholder=\"เช่น CloudTilt\">\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>หมวดหมู่<\u002Flabel>\n      <select class=\"form-input\" id=\"f-cat\" onchange=\"onCatChange(this)\">${getCatOptions(initCat)}<\u002Fselect>\n    <\u002Fdiv>\n    <div id=\"new-cat-row\" style=\"display:none\">\n      <div class=\"new-cat-box\">\n        <div class=\"form-row\" style=\"margin-bottom:0\">\n          <label>ชื่อหมวดหมู่ใหม่<\u002Flabel>\n          <input class=\"form-input\" id=\"f-new-cat\" placeholder=\"เช่น Watch, Jewelry\">\n        <\u002Fdiv>\n        <div class=\"form-row\" style=\"margin-bottom:0;margin-top:12px\">\n          <label>เลือกไอคอน<\u002Flabel>\n          <div class=\"cat-icon-strip\" id=\"new-cat-icons\">\n            ${CAT_ICONS.map((ic,i)=>`<div class=\"cat-icon-chip${i===0?' sel':''}\" onclick=\"pickCatIcon(this,'${ic}')\"><i class=\"ti ${ic}\"><\u002Fi><\u002Fdiv>`).join('')}\n          <\u002Fdiv>\n          <input type=\"hidden\" id=\"f-new-cat-icon\" value=\"${CAT_ICONS[0]}\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${isEdit?`\n    <div class=\"form-row\">\n      <label>ประเภทไซส์ <span>— เปลี่ยนได้หากตั้งผิด<\u002Fspan><\u002Flabel>\n      <select class=\"form-input\" id=\"f-sizetype\" style=\"height:36px\">\n        <option value=\"none\"${curSizeType==='none'?' selected':''}>ไม่มีไซส์<\u002Foption>\n        <option value=\"clothing\"${curSizeType==='clothing'?' selected':''}>เสื้อผ้า<\u002Foption>\n        <option value=\"shoes\"${curSizeType==='shoes'?' selected':''}>รองเท้า<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>`:`\n    <div class=\"form-row\">\n      <label>ประเภทไซส์<\u002Flabel>\n      <div class=\"seg\" id=\"sizetype-seg\">\n        <button type=\"button\" class=\"seg-btn active\" data-st=\"none\" onclick=\"selectSizeType('none')\">ไม่มีไซส์<\u002Fbutton>\n        <button type=\"button\" class=\"seg-btn\" data-st=\"clothing\" onclick=\"selectSizeType('clothing')\">เสื้อผ้า<\u002Fbutton>\n        <button type=\"button\" class=\"seg-btn\" data-st=\"shoes\" onclick=\"selectSizeType('shoes')\">รองเท้า<\u002Fbutton>\n      <\u002Fdiv>\n      <input type=\"hidden\" id=\"f-sizetype\" value=\"none\">\n    <\u002Fdiv>`}\n\n    <div class=\"form-group-label\"><i class=\"ti ti-coin\"><\u002Fi>ต้นทุน<\u002Fdiv>\n    <div class=\"form-2col\">\n      <div class=\"form-row\">\n        <label>ราคาที่ญี่ปุ่น (¥)<\u002Flabel>\n        <input class=\"form-input\" id=\"f-jpy\" type=\"number\" value=\"${p?p.jpy:''}\" oninput=\"modalOnJPY()\">\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <label>ต้นทุน Tax Free (฿)<\u002Flabel>\n        <input class=\"form-input\" id=\"f-taxfree\" type=\"number\" step=\"0.01\" value=\"${p?p.taxfree:''}\" readonly oninput=\"modalAutoCalc()\" style=\"background:var(--surface2);color:var(--text2)\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"calc-hint\" class=\"calc-hint\" style=\"${p&&p.jpy?'':'display:none'};margin-top:0;margin-bottom:10px\">\n      <i class=\"ti ti-calculator\"><\u002Fi><span id=\"calc-hint-text\"><\u002Fspan>\n    <\u002Fdiv>\n    <label class=\"check-row\">\n      <input type=\"checkbox\" id=\"f-no-taxfree\" onchange=\"toggleNoTaxFree()\"${p&&p.noTaxFree?' checked':''}>\n      <span>สินค้านี้ไม่มี Tax Free (กรอกต้นทุนเอง)<\u002Fspan>\n    <\u002Flabel>\n\n    <div class=\"form-group-label\"><i class=\"ti ti-cash-banknote\"><\u002Fi>การขาย<\u002Fdiv>\n    <div class=\"form-2col\">\n      <div class=\"form-row\">\n        <label>ราคาขายลูกค้า (฿)<\u002Fspan><\u002Flabel>\n        <input class=\"form-input\" id=\"f-sell\" type=\"number\" value=\"${p?p.sell:''}\" oninput=\"modalAutoCalc()\" style=\"border-color:var(--accent)\">\n      <\u002Fdiv>\n      <div class=\"form-row\">\n        <label>ราคาขายในไทย (฿)<\u002Fspan><\u002Flabel>\n        <input class=\"form-input\" id=\"f-thb\" type=\"number\" value=\"${p?p.thb:''}\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <div class=\"profit-display\" id=\"profit-display\">\n        <span style=\"font-size:12px;font-weight:500;color:var(--green)\">กำไรต่อชิ้น<\u002Fspan>\n        <span id=\"profit-amt\">${p&&p.profit!==undefined?'฿'+Math.round(p.profit).toLocaleString():'—'}<\u002Fspan>\n      <\u002Fdiv>\n      <input type=\"hidden\" id=\"f-profit\" value=\"${p?p.profit:''}\">\n    <\u002Fdiv>\n\n    <div class=\"form-group-label\"><i class=\"ti ti-photo\"><\u002Fi>รูปภาพ<\u002Fdiv>\n    <div class=\"form-row\">\n      <div class=\"img-drop\" id=\"img-drop\" onclick=\"document.getElementById('f-img').focus()\">\n        ${p&&p.img?`<img src=\"${p.img}\">`:`<i class=\"ti ti-photo\" style=\"font-size:28px\"><\u002Fi><span>วาง URL รูปภาพ<\u002Fspan>`}\n      <\u002Fdiv>\n      <input class=\"form-input\" id=\"f-img\" value=\"${p?p.img:''}\" placeholder=\"https://...\" oninput=\"previewModalImg()\" style=\"margin-top:6px\">\n    <\u002Fdiv>\n    <div class=\"modal-footer\">\n      <button class=\"btn\" onclick=\"closeModal()\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"saveProduct(${isEdit?p.id:'null'})\">${isEdit?'บันทึก':'เพิ่มสินค้า'}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n  if(p&&p.noTaxFree)toggleNoTaxFree();\n  else if(p&&p.jpy)updateCalcHint(p.jpy);\n}\n\nfunction onCatChange(sel){\n  document.getElementById('new-cat-row').style.display=sel.value==='__new__'?'block':'none';\n}\nfunction pickCatIcon(el,icon){\n  document.querySelectorAll('#new-cat-icons .cat-icon-chip').forEach(c=>c.classList.remove('sel'));\n  el.classList.add('sel');\n  document.getElementById('f-new-cat-icon').value=icon;\n}\nfunction selectSizeType(st){\n  document.getElementById('f-sizetype').value=st;\n  document.querySelectorAll('#sizetype-seg .seg-btn').forEach(el=>el.classList.toggle('active',el.dataset.st===st));\n}\nfunction modalOnJPY(){\n  if(document.getElementById('f-no-taxfree').checked)return; // manual mode, don't auto-calc\n  const jpy=parseFloat(document.getElementById('f-jpy').value)||0;\n  if(jpy>0){document.getElementById('f-taxfree').value=calcTaxFree(jpy).toFixed(2);updateCalcHint(jpy);}\n  modalAutoCalc();\n}\nfunction updateCalcHint(jpy){\n  const{rate,tax}=getRates();const tf=calcTaxFree(jpy);\n  const hint=document.getElementById('calc-hint'),htxt=document.getElementById('calc-hint-text');\n  if(hint&&htxt){hint.style.display='flex';htxt.textContent=`(¥${jpy.toLocaleString()} − ${tax}%) × ${rate} = ฿${Math.round(tf).toLocaleString()} · คำนวณอัตโนมัติ`;}\n}\nfunction toggleNoTaxFree(){\n  const cb=document.getElementById('f-no-taxfree').checked;\n  const tf=document.getElementById('f-taxfree');\n  const hint=document.getElementById('calc-hint');\n  if(cb){\n    tf.removeAttribute('readonly');\n    tf.style.background='var(--surface)';tf.style.color='var(--text)';\n    hint.style.display='none';\n  }else{\n    tf.setAttribute('readonly','');\n    tf.style.background='var(--surface2)';tf.style.color='var(--text2)';\n    const jpy=parseFloat(document.getElementById('f-jpy').value)||0;\n    if(jpy>0){tf.value=calcTaxFree(jpy).toFixed(2);updateCalcHint(jpy);}\n  }\n  modalAutoCalc();\n}\nfunction modalAutoCalc(){\n  const sell=parseFloat(document.getElementById('f-sell').value)||0;\n  const cost=parseFloat(document.getElementById('f-taxfree').value)||0;\n  const amt=document.getElementById('profit-amt'),ph=document.getElementById('f-profit'),pd=document.getElementById('profit-display');\n  if(sell&&cost){const pr=sell-cost;ph.value=pr.toFixed(2);\n    if(amt){amt.textContent='฿'+Math.round(pr).toLocaleString();}\n    if(pd){pd.style.color=pr>=0?'var(--green)':'var(--red)';pd.style.background=pr>=0?'var(--green-bg)':'var(--red-bg)';pd.style.borderColor=pr>=0?'#1f4d3d':'var(--red)';}\n  }else if(amt){amt.textContent='—';if(pd){pd.style.color='var(--text3)';pd.style.background='var(--surface2)';pd.style.borderColor='var(--border)';}}\n}\nfunction previewModalImg(){\n  const url=document.getElementById('f-img').value.trim();\n  document.getElementById('img-drop').innerHTML=url\n    ?`<img src=\"${url}\">`:`<i class=\"ti ti-photo\" style=\"font-size:28px\"><\u002Fi><span>วาง URL รูปภาพ<\u002Fspan>`;\n}\nfunction saveProduct(id){\n  const name=document.getElementById('f-name').value.trim();\n  if(!name){toast('กรุณาใส่ชื่อสินค้า',{kind:'err'});return;}\n  let cat=document.getElementById('f-cat').value;\n  if(cat==='__new__'){\n    const nn=document.getElementById('f-new-cat').value.trim();\n    if(!nn){toast('กรุณาใส่ชื่อหมวดหมู่',{kind:'err'});return;}\n    cat=nn.replace(/\\s+/g,'_');saveCustomCat(cat,nn,false,(document.getElementById('f-new-cat-icon')||{}).value||'ti-tag');buildSidebarNav();\n  }\n  const jpy=parseFloat(document.getElementById('f-jpy').value)||0;\n  const taxfree=parseFloat(document.getElementById('f-taxfree').value)||0;\n  const sell=parseFloat(document.getElementById('f-sell').value)||0;\n  const profit=parseFloat(document.getElementById('f-profit').value)||(sell-taxfree);\n  const sizeType=document.getElementById('f-sizetype').value||'none';\n  const noTaxFree=document.getElementById('f-no-taxfree').checked;\n  const obj={cat,name,thb:parseFloat(document.getElementById('f-thb').value)||0,jpy,taxfree,sell,profit,sizeType,noTaxFree,img:document.getElementById('f-img').value.trim()};\n  if(id===null){products.push({id:nextId++,...obj});}\n  else{const i=products.findIndex(p=>p.id===id);if(i>=0)products[i]={...products[i],...obj};}\n  save();closeModal();render();buildSidebarNav();\n}\n\nfunction toast(msg,opts){\n  opts=opts||{};\n  const kind=opts.kind||'';\n  const duration=opts.duration||(opts.actionLabel?3000:1500);\n  let box=document.getElementById('toasts');\n  if(!box){box=document.createElement('div');box.id='toasts';document.body.appendChild(box);}\n  const t=document.createElement('div');t.className='toast'+(kind?' '+kind:'');\n  const icon=kind==='ok'?'ti-circle-check':kind==='err'?'ti-alert-triangle':'ti-cloud';\n  t.innerHTML='<i class=\"ti '+icon+'\"><\u002Fi><span class=\"t-msg\"><\u002Fspan>'+(opts.actionLabel?'<button class=\"t-act\"><\u002Fbutton>':'')+'<span class=\"t-bar\"><\u002Fspan>';\n  t.querySelector('.t-msg').textContent=msg;\n  if(opts.actionLabel)t.querySelector('.t-act').textContent=opts.actionLabel;\n  box.appendChild(t);\n  const bar=t.querySelector('.t-bar');\n  bar.style.transition='transform '+duration+'ms linear';\n  requestAnimationFrame(()=>{bar.style.transform='scaleX(0)';});\n  let done=false;\n  const close=()=>{if(done)return;done=true;t.classList.add('out');setTimeout(()=>t.remove(),200);};\n  const timer=setTimeout(close,duration);\n  if(opts.actionLabel)t.querySelector('.t-act').onclick=()=>{clearTimeout(timer);if(opts.onAction)opts.onAction();close();};\n  return{close};\n}\nfunction showToast(msg){return toast(msg,{kind:'ok'});}\nfunction confirmDialog(msg,onYes,opts){\n  opts=opts||{};\n  const ov=document.createElement('div');ov.className='overlay';ov.style.zIndex='1000';\n  ov.innerHTML='<div class=\"confirm-box\"><div class=\"confirm-msg\"><\u002Fdiv><div class=\"confirm-actions\"><button class=\"btn confirm-cancel\">ยกเลิก<\u002Fbutton><button class=\"btn '+(opts.danger?'danger':'primary')+' confirm-ok\"><\u002Fbutton><\u002Fdiv><\u002Fdiv>';\n  ov.querySelector('.confirm-msg').textContent=msg;\n  ov.querySelector('.confirm-ok').textContent=opts.okLabel||'ตกลง';\n  document.body.appendChild(ov);\n  const close=()=>ov.remove();\n  ov.addEventListener('click',e=>{if(e.target===ov)close();});\n  ov.querySelector('.confirm-cancel').onclick=close;\n  ov.querySelector('.confirm-ok').onclick=()=>{close();if(onYes)onYes();};\n}\nfunction getHaptic(){const r=localStorage.getItem('jp2_haptic');return r===null?8:(+r||0);}\nfunction setHaptic(ms){\n  localStorage.setItem('jp2_haptic',String(ms));\n  document.querySelectorAll('#set-hap .theme-opt').forEach(el=>el.classList.toggle('sel',+el.dataset.ms===ms));\n  if(ms>0){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}\n}\nfunction haptic(){const ms=getHaptic();if(ms>0){try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}}}\ndocument.addEventListener('pointerdown',function(e){\n  const b=e.target.closest&&e.target.closest('.btn,.set-grad-btn,.pbuy,.pay-btn,.ch-opt,.pdone-undo');\n  if(!b)return;\n  if(!b.classList.contains('nohp'))haptic();\n  if(!b.matches('.set-grad-btn,.pbuy,.btn.primary'))return; // ripple เฉพาะปุ่มหลักทึบ ที่เหลือสั่นอย่างเดียว\n  const rect=b.getBoundingClientRect();\n  const size=Math.max(rect.width,rect.height);\n  const r=document.createElement('span');r.className='rpl';\n  r.style.width=r.style.height=size+'px';\n  r.style.left=(e.clientX-rect.left-size/2)+'px';\n  r.style.top=(e.clientY-rect.top-size/2)+'px';\n  b.appendChild(r);setTimeout(()=>r.remove(),520);\n});\nfunction closeModal(){document.getElementById('modal-root').innerHTML='';}\n\n/* ══════════ ORDERS ══════════ */\nlet orderChannelSel='LINE';\nlet orderStatusSel='deposit';\n\nfunction openAddOrder(productId){\n  const p=products.find(x=>x.id===productId);if(!p)return;\n  const cats=getAllCats();const meta=cats[p.cat]||{label:p.cat};\n  const sizeType=p.sizeType||'none';\n  orderChannelSel='LINE';orderStatusSel='deposit';\n  const esc=s=>String(s).replace(/'/g,\"\\\\'\");\n  document.getElementById('modal-root').innerHTML=`\n  <div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3>เพิ่มออเดอร์<\u002Fh3>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"width:32px;height:32px;padding:0;justify-content:center;border-radius:50%\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ord-prod\">\n      ${p.img?`<div style=\"width:52px;height:52px;border-radius:10px;background:#fff url('${esc(p.img)}') center/contain no-repeat;box-shadow:inset 0 0 0 1px var(--border);flex-shrink:0\"><\u002Fdiv>`:`<div class=\"${getCatColorClass(p.cat)}\" style=\"width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><i class=\"ti ${meta.icon||'ti-package'}\" style=\"font-size:26px\"><\u002Fi><\u002Fdiv>`}\n      <div style=\"min-width:0;flex:1\">\n        <div style=\"font-weight:600;font-size:14px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${p.name}<\u002Fdiv>\n        <span class=\"ord-prod-badge\"><i class=\"ti ${meta.icon||'ti-package'}\" style=\"font-size:13px\"><\u002Fi>${meta.label}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ord-prod-price\">\n        <div class=\"lbl\">ราคาขาย<\u002Fdiv>\n        <div class=\"amt\">฿${p.sell.toLocaleString()}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>ชื่อลูกค้า<\u002Flabel>\n      <div class=\"input-icon\">\n        <i class=\"ti ti-user\"><\u002Fi>\n        <input class=\"form-input\" id=\"o-name\" placeholder=\"เช่น คุณมิงค์\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>ช่องทางที่สั่ง<\u002Flabel>\n      <div class=\"ch-grid\" id=\"o-channel-grid\">\n        ${Object.entries(CHANNELS).map(([k,v])=>`<div class=\"ch-opt ${v.cls}${k===orderChannelSel?' sel':''}\" data-ch=\"${k}\" style=\"--ch-color:${v.color};--ch-bg:${v.bg}\" onclick=\"selectChannel('${k}')\"><i class=\"ti ${v.icon}\"><\u002Fi>${v.label}<\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${sizeType==='clothing'?`<div class=\"form-row\">\n      <label>ไซส์ที่ลูกค้าสั่ง<\u002Flabel>\n      <div class=\"size-grid\" id=\"o-size-grid\">\n        ${CLOTHING_SIZES.map(s=>`<div class=\"size-opt\" data-sz=\"${s}\" onclick=\"pickOrderSize(this,'${s}')\">${s}<\u002Fdiv>`).join('')}\n        <div class=\"size-opt\" id=\"o-size-other-btn\" onclick=\"toggleOrderSizeOther()\">อื่นๆ<\u002Fdiv>\n      <\u002Fdiv>\n      <input class=\"form-input\" id=\"o-size-other\" placeholder=\"พิมพ์ไซส์เอง\" style=\"margin-top:8px;display:none\">\n      <input type=\"hidden\" id=\"o-size\" value=\"\">\n    <\u002Fdiv>`:sizeType==='shoes'?`<div class=\"form-row\">\n      <label>ไซส์ที่ลูกค้าสั่ง<\u002Flabel>\n      <input class=\"form-input\" id=\"o-size\" placeholder=\"เช่น 42 หรือ US9\">\n    <\u002Fdiv>`:`<input type=\"hidden\" id=\"o-size\" value=\"\">`}\n    <div class=\"form-row\">\n      <label>หมายเหตุ <span>— สี หรือรายละเอียดอื่นๆ<\u002Fspan><\u002Flabel>\n      <div class=\"input-icon\">\n        <i class=\"ti ti-note\"><\u002Fi>\n        <input class=\"form-input\" id=\"o-note\" placeholder=\"เช่น สีดำ, ลายพิเศษ\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>สถานะการจ่าย<\u002Flabel>\n      <div class=\"pay-grid\" id=\"o-status-seg\">\n        <button class=\"pay-btn active\" data-st=\"deposit\" onclick=\"selectOrderStatus('deposit')\"><i class=\"ti ti-coin\"><\u002Fi>มัดจำ<\u002Fbutton>\n        <button class=\"pay-btn\" data-st=\"paid\" onclick=\"selectOrderStatus('paid')\"><i class=\"ti ti-circle-check\"><\u002Fi>จ่ายเต็ม<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\" id=\"o-deposit-row\">\n      <label>ยอดมัดจำ (฿)<\u002Flabel>\n      <div class=\"input-icon\">\n        <i class=\"ti ti-cash\"><\u002Fi>\n        <input class=\"form-input\" id=\"o-deposit-amt\" type=\"number\" min=\"0\" placeholder=\"เช่น 2000\" oninput=\"updateDepositHint(${p.sell})\">\n      <\u002Fdiv>\n      <div class=\"bal-warn\" id=\"o-deposit-hint\" style=\"display:none\"><i class=\"ti ti-alert-triangle\"><\u002Fi><span><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ord-footer\">\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"justify-content:center\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"saveOrder(${p.id})\" style=\"justify-content:center\"><i class=\"ti ti-check\"><\u002Fi>บันทึกออเดอร์<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n}\n\nfunction selectChannel(k){\n  orderChannelSel=k;\n  document.querySelectorAll('#o-channel-grid .ch-opt').forEach(el=>el.classList.toggle('sel',el.dataset.ch===k));\n}\nfunction pickOrderSize(el,sz){\n  document.querySelectorAll('#o-size-grid .size-opt').forEach(e=>e.classList.remove('sel'));\n  el.classList.add('sel');\n  document.getElementById('o-size').value=sz;\n  const other=document.getElementById('o-size-other');\n  if(other){other.style.display='none';other.value='';}\n}\nfunction toggleOrderSizeOther(){\n  document.querySelectorAll('#o-size-grid .size-opt').forEach(e=>e.classList.remove('sel'));\n  document.getElementById('o-size-other-btn').classList.add('sel');\n  const other=document.getElementById('o-size-other');\n  other.style.display='block';other.focus();\n  document.getElementById('o-size').value='';\n}\nfunction selectOrderStatus(st){\n  orderStatusSel=st;\n  document.querySelectorAll('#o-status-seg .pay-btn').forEach(el=>el.classList.toggle('active',el.dataset.st===st));\n  document.getElementById('o-deposit-row').style.display=st==='deposit'?'block':'none';\n}\nfunction updateDepositHint(sell){\n  const amt=parseFloat(document.getElementById('o-deposit-amt').value)||0;\n  const hint=document.getElementById('o-deposit-hint');\n  if(amt>0){hint.style.display='flex';hint.querySelector('span').textContent=`คงเหลือต้องเก็บอีก ฿${Math.max(0,sell-amt).toLocaleString()}`;}\n  else hint.style.display='none';\n}\n\nfunction saveOrder(productId){\n  const p=products.find(x=>x.id===productId);if(!p)return;\n  const name=document.getElementById('o-name').value.trim();\n  if(!name){toast('กรุณาใส่ชื่อลูกค
