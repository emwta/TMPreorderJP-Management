้า',{kind:'err'});return;}\n  // size: from hidden field, or from the \"อื่นๆ\" type-in if it's showing\n  let size=(document.getElementById('o-size')||{}).value||'';\n  const other=document.getElementById('o-size-other');\n  if(other&&other.style.display!=='none'&&other.value.trim())size=other.value.trim();\n  size=size.trim();\n  const note=(document.getElementById('o-note')||{}).value||'';\n  const deposit=orderStatusSel==='deposit'?(parseFloat(document.getElementById('o-deposit-amt').value)||0):p.sell;\n  orders.push({\n    id:nextOrderId++,\n    productId:p.id,\n    productName:p.name,\n    cat:p.cat,\n    img:p.img,\n    sell:p.sell,\n    customer:name,\n    channel:orderChannelSel,\n    size:size,\n    note:note.trim(),\n    status:orderStatusSel,\n    purchased:false,\n    deposit:deposit,\n    date:new Date().toISOString().slice(0,10),\n    time:new Date().toTimeString().slice(0,5)\n  });\n  save();closeModal();buildSidebarNav();render();\n  showToast('✓ บันทึกออเดอร์ของ '+name+' แล้ว');\n}\n\nfunction getFilteredOrders(){\n  const ch=document.getElementById('order-channel-filter').value;\n  const st=document.getElementById('order-status-filter').value;\n  const q2=(document.getElementById('search-box').value||'').toLowerCase().trim();\n  const wantPurchased=(currentView==='purchased');\n  return orders.filter(o=>{\n    if(!!o.purchased!==wantPurchased)return false;\n    if(ch&&o.channel!==ch)return false;\n    const owe=o.status!=='paid'&&Math.max(0,(o.sell||0)-(o.deposit||0))>0;\n    if(st==='owe'){if(!owe)return false;}\n    else if(st&&o.status!==st)return false;\n    const hay=((o.customer||'')+' '+(o.productName||'')).toLowerCase();\n    if(q2&&!hay.includes(q2))return false;\n    return true;\n  }).slice().reverse();\n}\n\nfunction renderOrders(){\n  const list=getFilteredOrders();\n  const wrap=document.getElementById('orders-list');\n  const empty=document.getElementById('orders-empty');\n  // summary (over ALL orders, not filtered)\n  const totalDeposit=orders.reduce((s,o)=>s+(o.status==='deposit'?(o.deposit||0):0),0);\n  const balance=orders.reduce((s,o)=>s+(o.status==='deposit'?Math.max(0,o.sell-(o.deposit||0)):0),0);\n  const paidCount=orders.filter(o=>o.status==='paid').length;\n  // cost & profit per order = look up the product's taxfree & profit\n  let totalCost=0,totalProfit=0;\n  orders.forEach(o=>{\n    const p=products.find(x=>x.id===o.productId);\n    if(p){totalCost+=p.taxfree;totalProfit+=p.profit;}\n    else{totalProfit+=0;} // product deleted - skip cost\n  });\n  const totalSales=orders.reduce((s,o)=>s+(o.sell||0),0);\n  document.getElementById('o-deposit').textContent='฿'+Math.round(totalDeposit).toLocaleString();\n  document.getElementById('o-balance').textContent='฿'+Math.round(balance).toLocaleString();\n  document.getElementById('o-paid').textContent=paidCount;\n  document.getElementById('o-count').textContent=orders.length;\n  document.getElementById('o-sales').textContent='฿'+Math.round(totalSales).toLocaleString();\n  document.getElementById('o-cost').textContent='฿'+Math.round(totalCost).toLocaleString();\n  document.getElementById('o-profit').textContent='฿'+Math.round(totalProfit).toLocaleString();\n  const totalThisView=orders.filter(o=>!!o.purchased===(currentView==='purchased')).length;\n  document.getElementById('orders-sub').textContent=`${list.length} จาก ${totalThisView} รายการ`;\n\n  renderSalesSummary();\n\n  if(!list.length){\n    wrap.innerHTML='';\n    empty.style.display='block';\n    empty.innerHTML=currentView==='purchased'\n      ?`<i class=\"ti ti-package-off\"><\u002Fi>ยังไม่มีรายการที่ซื้อ<br><span style=\"font-size:12px\">กด \"ซื้อแล้ว\" ในหน้า Orders เพื่อย้ายมาที่นี่<\u002Fspan>`\n      :`<i class=\"ti ti-clipboard-off\"><\u002Fi>ยังไม่มีออเดอร์<br><span style=\"font-size:12px\">กดปุ่ม Add Order ที่สินค้าเพื่อเพิ่มออเดอร์<\u002Fspan>`;\n    return;\n  }\n  empty.style.display='none';\n  const cats=getAllCats();\n  wrap.innerHTML=list.map(o=>{\n    const meta=cats[o.cat]||{label:o.cat,icon:'ti-package'};\n    const ch=CHANNELS[o.channel]||{label:o.channel,icon:'ti-user',cls:'ch-personal'};\n    const esc=s=>String(s).replace(/'/g,\"%27\");\n    const thumb=o.img\n      ?`<div class=\"order-thumb\" onclick=\"event.stopPropagation();viewImg('${esc(o.img)}')\"><div class=\"o-plate\"><img loading=\"lazy\" decoding=\"async\" src=\"${esc(o.img)}\" alt=\"\"><\u002Fdiv><\u002Fdiv>`\n      :`<div class=\"order-thumb-ph ${getCatColorClass(o.cat)}\"><i class=\"ti ${meta.icon}\"><\u002Fi><\u002Fdiv>`;\n    const bal=Math.max(0,o.sell-(o.deposit||0));\n    const owe=o.status!=='paid'&&bal>0;\n    const statusHtml=o.status==='paid'\n      ?`<span class=\"order-pill pill-paid\"><i class=\"ti ti-check\"><\u002Fi>จ่ายแล้ว<\u002Fspan>`\n      :`<span class=\"order-pill pill-deposit\">มัดจำ ฿${(o.deposit||0).toLocaleString()}<\u002Fspan><span class=\"order-balance\">เหลือ ฿${bal.toLocaleString()}<\u002Fspan>`;\n    return`<div class=\"order-card${owe?' owe':''}\" onclick=\"openEditOrder(${o.id})\">\n      ${thumb}\n      <div class=\"order-body\">\n        <div class=\"order-top\">\n          <div style=\"min-width:0\">\n            <div class=\"order-prod\">${o.productName}<\u002Fdiv>\n            <div class=\"order-prod-sub\">${o.size?'Size: '+o.size+' · ':''}฿${o.sell.toLocaleString()}${o.note?' · '+o.note:''}<\u002Fdiv>\n          <\u002Fdiv>\n          <i class=\"ti ti-chevron-right\" style=\"font-size:16px;color:var(--text3);flex-shrink:0\"><\u002Fi>\n        <\u002Fdiv>\n        <div class=\"order-meta\">\n          <span class=\"order-channel ${ch.cls}\"><i class=\"ti ${ch.icon}\"><\u002Fi>${o.customer}<\u002Fspan>\n          ${statusHtml}\n          ${o.date?`<span style=\"font-size:10px;color:var(--text3);margin-left:auto\"><i class=\"ti ti-calendar\" style=\"font-size:11px\"><\u002Fi> ${o.date}${o.time?' '+o.time:''}<\u002Fspan>`:''}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n}\n\nfunction renderSalesSummary(){\n  const cats=getAllCats();\n  // aggregate orders by product\n  const map={};\n  orders.forEach(o=>{\n    if(!map[o.productId])map[o.productId]={productId:o.productId,name:o.productName,cat:o.cat,img:o.img,count:0};\n    map[o.productId].count++;\n  });\n  let rows=Object.values(map).map(m=>{\n    const p=products.find(x=>x.id===m.productId);\n    const costEach=p?p.taxfree:0;\n    const profitEach=p?p.profit:0;\n    return{...m,cost:costEach*m.count,profit:profitEach*m.count};\n  });\n  rows.sort((a,b)=>b.profit-a.profit);\n  const listEl=document.getElementById('sales-summary-list');\n  const grandEl=document.getElementById('sales-grand-total');\n  if(!rows.length){\n    listEl.innerHTML=`<div style=\"color:var(--text3);font-size:12px;padding:8px 0\">ยังไม่มีออเดอร์<\u002Fdiv>`;\n    grandEl.innerHTML='';return;\n  }\n  listEl.innerHTML=rows.map(r=>{\n    const meta=cats[r.cat]||{label:r.cat,icon:'ti-package'};\n    const esc=s=>String(s).replace(/'/g,\"%27\");\n    const thumb=r.img\n      ?`<div style=\"width:42px;height:42px;border-radius:9px;background:#fff;box-shadow:inset 0 0 0 1px var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden\"><img loading=\"lazy\" decoding=\"async\" src=\"${esc(r.img)}\" style=\"max-width:100%;max-height:100%;object-fit:contain;display:block\"><\u002Fdiv>`\n      :`<div class=\"${getCatColorClass(r.cat)}\" style=\"width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><i class=\"ti ${meta.icon}\" style=\"font-size:20px\"><\u002Fi><\u002Fdiv>`;\n    return`<div style=\"background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:8px 8px;display:flex;align-items:center;gap:12px\">\n      ${thumb}\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"font-weight:600;font-size:13px;color:var(--text)\">${r.name}<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--text3);margin-top:2px\">ขายได้ <b style=\"color:var(--accent-text)\">${r.count} ชิ้น<\u002Fb> · ต้นทุนรวม ฿${Math.round(r.cost).toLocaleString()}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;flex-shrink:0\">\n        <div style=\"font-size:10px;color:var(--text3)\">กำไรรวม<\u002Fdiv>\n        <div style=\"font-size:16px;font-weight:700;color:var(--green)\">฿${Math.round(r.profit).toLocaleString()}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  }).join('');\n  const totalCount=rows.reduce((s,r)=>s+r.count,0);\n  const totalCost=rows.reduce((s,r)=>s+r.cost,0);\n  const totalProfit=rows.reduce((s,r)=>s+r.profit,0);\n  grandEl.innerHTML=`<div style=\"margin-top:12px;padding:13px 15px;background:linear-gradient(135deg,var(--green-bg),color-mix(in srgb,var(--green-bg) 70%,transparent));border:1px solid color-mix(in srgb,var(--green) 26%,transparent);border-radius:var(--r12);display:flex;align-items:center;justify-content:space-between\">\n    <div>\n      <div style=\"font-size:11px;font-weight:700;color:var(--green)\">รวมทั้งหมด · ${totalCount} ชิ้น<\u002Fdiv>\n      <div style=\"font-size:11px;color:var(--text2);margin-top:3px\">ต้นทุน ฿${Math.round(totalCost).toLocaleString()}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:right\">\n      <div style=\"font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)\">กำไรสุทธิ<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:1px;background:linear-gradient(135deg,#22d3ee,var(--green));-webkit-background-clip:text;background-clip:text;color:transparent\">฿${Math.round(totalProfit).toLocaleString()}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction openEditOrder(orderId){\n  const o=orders.find(x=>String(x.id)===String(orderId));if(!o)return;\n  orderChannelSel=o.channel;\n  orderStatusSel=o.status==='paid'?'paid':'deposit';\n  const sell=Number(o.sell)||0, dep=Number(o.deposit)||0;\n  const cats=getAllCats();const meta=cats[o.cat]||{label:o.cat||'',icon:'ti-package'};\n  document.getElementById('modal-root').innerHTML=`\n  <div class=\"overlay\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-header\">\n      <h3>แก้ไขออเดอร์<\u002Fh3>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"width:32px;height:32px;padding:0;justify-content:center;border-radius:50%\"><i class=\"ti ti-x\"><\u002Fi><\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ord-prod\">\n      ${o.img?`<div style=\"width:52px;height:52px;border-radius:10px;background:#fff url('${String(o.img).replace(/'/g,'%27')}') center/contain no-repeat;box-shadow:inset 0 0 0 1px var(--border);flex-shrink:0\"><\u002Fdiv>`:`<div class=\"${getCatColorClass(o.cat)}\" style=\"width:52px;height:52px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><i class=\"ti ${meta.icon||'ti-package'}\" style=\"font-size:26px\"><\u002Fi><\u002Fdiv>`}\n      <div style=\"min-width:0;flex:1\">\n        <div style=\"font-weight:600;font-size:14px;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">${String(o.productName||'')}<\u002Fdiv>\n        <span class=\"ord-prod-badge\"><i class=\"ti ${meta.icon||'ti-package'}\" style=\"font-size:13px\"><\u002Fi>${meta.label}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ord-prod-price\"><div class=\"lbl\">ราคาขาย<\u002Fdiv><div class=\"amt\">฿${sell.toLocaleString()}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    ${o.purchased\n      ?`<div class=\"pdone\"><div class=\"pdone-chip\"><i class=\"ti ti-circle-check\"><\u002Fi>ซื้อของแล้ว<\u002Fdiv><button class=\"pdone-undo\" onclick=\"togglePurchased(${o.id})\"><i class=\"ti ti-arrow-back-up\"><\u002Fi>ย้อนกลับ<\u002Fbutton><\u002Fdiv>`\n      :`<button class=\"pbuy\" onclick=\"togglePurchased(${o.id})\"><i class=\"ti ti-shopping-bag-check\"><\u002Fi>ซื้อของแล้ว<\u002Fbutton>`}\n    <div class=\"form-row\">\n      <label>ชื่อลูกค้า<\u002Flabel>\n      <div class=\"input-icon\"><i class=\"ti ti-user\"><\u002Fi><input class=\"form-input\" id=\"oe-name\" value=\"${String(o.customer||'').replace(/\"/g,'&quot;')}\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>ช่องทางที่สั่ง<\u002Flabel>\n      <div class=\"ch-grid\" id=\"o-channel-grid\">\n        ${Object.entries(CHANNELS).map(([k,v])=>`<div class=\"ch-opt ${v.cls}${k===o.channel?' sel':''}\" data-ch=\"${k}\" style=\"--ch-color:${v.color};--ch-bg:${v.bg}\" onclick=\"selectChannel('${k}')\"><i class=\"ti ${v.icon}\"><\u002Fi>${v.label}<\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>ไซส์<\u002Flabel>\n      <div class=\"input-icon\"><i class=\"ti ti-ruler-2\"><\u002Fi><input class=\"form-input\" id=\"oe-size\" value=\"${String(o.size||'').replace(/\"/g,'&quot;')}\" placeholder=\"ไม่ระบุ\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>หมายเหตุ <span>— สี หรือรายละเอียดอื่นๆ<\u002Fspan><\u002Flabel>\n      <div class=\"input-icon\"><i class=\"ti ti-note\"><\u002Fi><input class=\"form-input\" id=\"oe-note\" value=\"${String(o.note||'').replace(/\"/g,'&quot;')}\" placeholder=\"เช่น สีดำ\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\">\n      <label>สถานะการจ่าย<\u002Flabel>\n      <div class=\"pay-grid\" id=\"o-status-seg\">\n        <button class=\"pay-btn${orderStatusSel==='deposit'?' active':''}\" data-st=\"deposit\" onclick=\"selectOrderStatus('deposit')\"><i class=\"ti ti-coin\"><\u002Fi>มัดจำ<\u002Fbutton>\n        <button class=\"pay-btn${orderStatusSel==='paid'?' active':''}\" data-st=\"paid\" onclick=\"selectOrderStatus('paid')\"><i class=\"ti ti-circle-check\"><\u002Fi>จ่ายเต็ม<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-row\" id=\"o-deposit-row\" style=\"display:${orderStatusSel==='deposit'?'block':'none'}\">\n      <label>ยอดมัดจำ (฿)<\u002Flabel>\n      <div class=\"input-icon\"><i class=\"ti ti-cash\"><\u002Fi><input class=\"form-input\" id=\"o-deposit-amt\" type=\"number\" min=\"0\" value=\"${dep||''}\" oninput=\"updateDepositHint(${sell})\"><\u002Fdiv>\n      <div class=\"bal-warn\" id=\"o-deposit-hint\" style=\"display:none\"><i class=\"ti ti-alert-triangle\"><\u002Fi><span><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ord-footer\" style=\"grid-template-columns:auto 1fr 1fr\">\n      <button class=\"btn danger\" onclick=\"deleteOrder(${o.id})\" style=\"justify-content:center\"><i class=\"ti ti-trash\"><\u002Fi>ลบ<\u002Fbutton>\n      <button class=\"btn\" onclick=\"closeModal()\" style=\"justify-content:center\">ยกเลิก<\u002Fbutton>\n      <button class=\"btn primary\" onclick=\"updateOrder(${o.id})\" style=\"justify-content:center\"><i class=\"ti ti-check\"><\u002Fi>บันทึก<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n  if(orderStatusSel==='deposit')updateDepositHint(sell);\n}\n\nfunction togglePurchased(orderId){\n  const o=orders.find(x=>String(x.id)===String(orderId));if(!o)return;\n  o.purchased=!o.purchased;\n  save();closeModal();renderOrders();buildSidebarNav();render();\n  showToast(o.purchased?'✓ ย้ายไป Purchased แล้ว':'✓ ย้ายกลับ Orders แล้ว');\n}\nfunction updateOrder(orderId){\n  const o=orders.find(x=>String(x.id)===String(orderId));if(!o)return;\n  const name=document.getElementById('oe-name').value.trim();\n  if(!name){toast('กรุณาใส่ชื่อลูกค้า',{kind:'err'});return;}\n  o.customer=name;\n  o.channel=orderChannelSel;\n  o.size=document.getElementById('oe-size').value.trim();\n  o.note=document.getElementById('oe-note').value.trim();\n  o.status=orderStatusSel;\n  if(orderStatusSel==='deposit')o.deposit=parseFloat(document.getElementById('o-deposit-amt').value)||0;\n  else o.deposit=Number(o.sell)||0;\n  save();closeModal();renderOrders();buildSidebarNav();\n  showToast('✓ บันทึกแล้ว');\n}\nfunction deleteOrder(orderId){\n  const o0=orders.find(o=>String(o.id)===String(orderId));if(!o0)return;\n  const nm=o0.customer?('ของ '+o0.customer):'นี้';\n  confirmDialog('ต้องการลบออเดอร์ '+nm+' ?\\nการลบจะมีผลหลังจากบันทึกข้อมูล',()=>{\n    const idx=orders.findIndex(o=>String(o.id)===String(orderId));if(idx<0)return;\n    const removed=orders[idx];\n    orders.splice(idx,1);\n    save();closeModal();renderOrders();buildSidebarNav();render();\n    toast('ลบออเดอร์แล้ว',{actionLabel:'เลิกทำ',duration:3000,onAction:()=>{\n      orders.splice(Math.min(idx,orders.length),0,removed);\n      save();renderOrders();buildSidebarNav();render();\n    }});\n  },{okLabel:'ลบ',danger:true});\n}\n\napplyTheme();buildSidebarNav();render();\nif(syncEnabled()){setSyncIndicator('syncing');pullFromSheet();startSyncPolling();}else{setSyncIndicator('off');}\nif('serviceWorker' in navigator && location.protocol.startsWith('http') && false){navigator.serviceWorker.register('sw.js').then(reg=>{console.log('SW registered')}).catch(e=>{console.log('SW error:',e)});}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
